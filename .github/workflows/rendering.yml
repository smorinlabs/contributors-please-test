            echo "duplicate_marker_outcome: ${{ steps.duplicate_marker.outcome }}"
            echo "inverted_marker_outcome: ${{ steps.inverted_marker.outcome }}"
            echo "mutual_exclusion_outcome: ${{ steps.mutual_exclusion.outcome }}"
            echo "control_output: test-output/CP-GHA-018/control-contributors.md"
            echo "artifact: cp-gha-018"
          } > test-output/CP-GHA-018/expected-failure.log
