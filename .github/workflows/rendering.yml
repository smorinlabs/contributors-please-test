  cp-gha-019:
    name: CP-GHA-019 config-file in-place composition
    needs: cp-gha-018
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-019') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/checkout@v6
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare fixture
        run: |
          set -euo pipefail
          git pull --ff-only origin "$GITHUB_REF_NAME"
          out_dir="test-output/CP-GHA-019"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          cat > "$out_dir/.contributors.jsonl" <<'JSONL'
          {"login":"compose-one","name":"Compose One","profile":"https://example.com/compose-one","avatar":"","source":"commit","pinned":false,"categories":["code"],"title":"Code Contributor","emoji":"code","commits":3,"first_seen":"2026-05-27","last_updated":"2026-05-27"}
          {"login":"compose-two","name":"Compose Two","profile":"https://example.com/compose-two","avatar":"","source":"commit","pinned":false,"categories":["code"],"title":"Code Contributor","emoji":"code","commits":2,"first_seen":"2026-05-27","last_updated":"2026-05-27"}
          {"login":"compose-three","name":"Compose Three","profile":"https://example.com/compose-three","avatar":"","source":"commit","pinned":false,"categories":["code"],"title":"Code Contributor","emoji":"code","commits":1,"first_seen":"2026-05-27","last_updated":"2026-05-27"}
          JSONL
          # Rendering settings come ONLY from the config file; the matching action
          # inputs (in-place, columns-per-row, entry-template) are deliberately
          # left unset below so this exercises config-file composition — the path
          # a real .contributors.yml uses.
          cat > "$out_dir/.contributors.yml" <<'YAML'
          in_place: true
          columns_per_row: 1
          entry_template: "- [{{name}}]({{profile}})"
          YAML
          cat > "$out_dir/contributors.md" <<'EOF'
          # Contributors

          Intro prose that must survive.

          <!-- contributors-please:start -->
          stale body
          <!-- contributors-please:end -->

          ## How to Contribute

          Footer prose that must survive.
          EOF
          node <<'JS'
          const fs = require("fs");
          const path = "test-output/CP-GHA-019/contributors.md";
          const text = fs.readFileSync(path, "utf8");
          const start = "<!-- contributors-please:start -->";
          const end = "<!-- contributors-please:end -->";
          fs.writeFileSync(`${path}.prefix`, text.slice(0, text.indexOf(start) + start.length));
          fs.writeFileSync(`${path}.suffix`, text.slice(text.indexOf(end)));
          JS
          bash scripts/start-fake-api.sh 18019 "$out_dir" render-bot-019 14019 CP_GHA_019_API /__ready
      - name: Run config-driven in-place rendering
        id: contributors
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_019_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-019/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-019/.contributors.jsonl' \
            'INPUT_CONFIG-FILE=test-output/CP-GHA-019/.contributors.yml' \
            'INPUT_MODE=commit' \
            'INPUT_DRY-RUN=false' \
            'INPUT_BOOTSTRAP=false' \
            'INPUT_MIN-CONTRIBUTIONS=1' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Verify output
        run: |
          set -euo pipefail
          file=test-output/CP-GHA-019/contributors.md
          # Surrounding content survives — proves in-place edit, not whole-file replace.
          grep -F "# Contributors" "$file"
          grep -F "Intro prose that must survive." "$file"
          grep -F "## How to Contribute" "$file"
          grep -F "Footer prose that must survive." "$file"
          grep -F "<!-- contributors-please:start -->" "$file"
          grep -F "<!-- contributors-please:end -->" "$file"
          # Entries rendered from the config-file entry_template.
          grep -F -- "- [Compose One](https://example.com/compose-one)" "$file"
          grep -F -- "- [Compose Two](https://example.com/compose-two)" "$file"
          grep -F -- "- [Compose Three](https://example.com/compose-three)" "$file"
          # columns_per_row: 1 from config → one entry per line (not mashed on one row).
          entry_lines="$(grep -cE '^- \[Compose ' "$file")"
          test "$entry_lines" = "3"
          # Stale in-place body was replaced.
          if grep -F "stale body" "$file"; then
            echo "config-driven in-place body was not replaced" >&2
            exit 1
          fi
          # Prefix/suffix around the markers are byte-identical.
          node <<'JS'
          const fs = require("fs");
          const path = "test-output/CP-GHA-019/contributors.md";
          const text = fs.readFileSync(path, "utf8");
          const start = "<!-- contributors-please:start -->";
          const end = "<!-- contributors-please:end -->";
          if (fs.readFileSync(`${path}.prefix`, "utf8") !== text.slice(0, text.indexOf(start) + start.length)) {
            throw new Error("prefix changed");
          }
          if (fs.readFileSync(`${path}.suffix`, "utf8") !== text.slice(text.indexOf(end))) {
            throw new Error("suffix changed");
          }
          JS
          {
            echo "### CP-GHA-019"
            echo ""
            echo "- output: test-output/CP-GHA-019/contributors.md"
            echo "- config-file: test-output/CP-GHA-019/.contributors.yml (in_place, columns_per_row, entry_template)"
            echo "- in-place / columns-per-row / entry-template inputs: unset (sourced from config)"
            echo "- changed: ${{ steps.contributors.outputs.changed }}"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        with:
          name: cp-gha-019
          path: test-output/CP-GHA-019
          include-hidden-files: true

  cp-gha-020:
    # Regression coverage for the canonical "well-shaped consumer config" pattern
    # as adopted by smorinlabs/py-launch-blueprint's .contributors.yml. Bridges
    # CP-GHA-019 (in_place + columns_per_row + entry_template only, seeded state)
    # by additionally exercising classification (categories + default + project
    # combination), identity_map (multi-email coalescing into one login), and
    # the ignore list (non-bot login filtered) against REAL git ingestion —
    # because classification and identity_map run at ingest, not render.
    name: CP-GHA-020 py-launch-blueprint config-shape ingest+render
    needs: cp-gha-019
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-020') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Prepare fake API contributors fixture and start server
        run: |
          set -euo pipefail
          out_dir="test-output/CP-GHA-020"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          # API contributors include 'claude' on purpose — the config's ignore
          # list must filter it out at render time. Without 'claude' here we
          # could not prove the ignore *list* (vs the implicit `[bot]` filter)
          # is honored, since 'claude' has no `[bot]` suffix.
          cat > "$out_dir/api-contributors.json" <<'JSON'
          [
            {"login":"code-contrib","name":"Code Contrib","contributions":4},
            {"login":"polymath","name":"Poly Math","contributions":3},
            {"login":"docs-contrib","name":"Docs Contrib","contributions":2},
            {"login":"quality-contrib","name":"Quality Contrib","contributions":1},
            {"login":"claude","name":"Claude Bot","contributions":5}
          ]
          JSON
          bash scripts/start-fake-api.sh 18020 "$out_dir" render-bot-020 14020 CP_GHA_020_API /__ready
      - name: Seed orphan git history exercising classification + identity_map
        run: |
          set -euo pipefail
          # Create an orphan branch so the action's git ingestion sees ONLY the
          # fixture commits below — no real repo history bleeds in.
          git checkout --orphan "cp-gha-020-${GITHUB_RUN_ID}"
          git rm -rf . >/dev/null 2>&1 || true
          mkdir -p src docs tests
          # identity_map case — same login 'code-contrib' commits under TWO
          # distinct non-noreply emails; the action must sum to 4 commits.
          # Distinct commit counts per login keep sort deterministic (no
          # alpha-tiebreak under sort:contributions).
          printf 'a\n' > src/a.py && git add src/a.py
          GIT_AUTHOR_DATE="2026-05-01T00:00:00Z" \
          GIT_COMMITTER_DATE="2026-05-01T00:00:00Z" \
          git -c user.name="Code Contrib" -c user.email="code1@example.com" \
            commit -m "test: code a"
          printf 'b\n' > src/b.py && git add src/b.py
          GIT_AUTHOR_DATE="2026-05-02T00:00:00Z" \
          GIT_COMMITTER_DATE="2026-05-02T00:00:00Z" \
          git -c user.name="Code Contrib" -c user.email="code1@example.com" \
            commit -m "test: code b"
          printf 'c\n' > src/c.py && git add src/c.py
          GIT_AUTHOR_DATE="2026-05-03T00:00:00Z" \
          GIT_COMMITTER_DATE="2026-05-03T00:00:00Z" \
          git -c user.name="Code Contrib" -c user.email="code2@example.com" \
            commit -m "test: code c (second email)"
          printf 'd\n' > src/d.py && git add src/d.py
          GIT_AUTHOR_DATE="2026-05-04T00:00:00Z" \
          GIT_COMMITTER_DATE="2026-05-04T00:00:00Z" \
          git -c user.name="Code Contrib" -c user.email="code2@example.com" \
            commit -m "test: code d (second email)"
          # classification combination case — polymath touches src/ (code via
          # default) + docs/ (docs) + tests/ (quality). All three matched ⇒
          # combination 'project' triggers ⇒ title "Project Contributor".
          printf 'p1\n' > src/p1.py && git add src/p1.py
          GIT_AUTHOR_DATE="2026-05-05T00:00:00Z" \
          GIT_COMMITTER_DATE="2026-05-05T00:00:00Z" \
          git -c user.name="Poly Math" -c user.email="polymath@example.com" \
            commit -m "test: polymath src"
          printf 'p2\n' > docs/p2.md && git add docs/p2.md
          GIT_AUTHOR_DATE="2026-05-06T00:00:00Z" \
          GIT_COMMITTER_DATE="2026-05-06T00:00:00Z" \
          git -c user.name="Poly Math" -c user.email="polymath@example.com" \
            commit -m "test: polymath docs"
          printf 'p3\n' > tests/p3.py && git add tests/p3.py
          GIT_AUTHOR_DATE="2026-05-07T00:00:00Z" \
          GIT_COMMITTER_DATE="2026-05-07T00:00:00Z" \
          git -c user.name="Poly Math" -c user.email="polymath@example.com" \
            commit -m "test: polymath tests"
          # docs-only — should classify as Documentation Contributor.
          printf 'r\n' > docs/readme.md && git add docs/readme.md
          GIT_AUTHOR_DATE="2026-05-08T00:00:00Z" \
          GIT_COMMITTER_DATE="2026-05-08T00:00:00Z" \
          git -c user.name="Docs Contrib" -c user.email="docs@example.com" \
            commit -m "test: docs readme"
          printf 'g\n' > docs/guide.md && git add docs/guide.md
          GIT_AUTHOR_DATE="2026-05-09T00:00:00Z" \
          GIT_COMMITTER_DATE="2026-05-09T00:00:00Z" \
          git -c user.name="Docs Contrib" -c user.email="docs@example.com" \
            commit -m "test: docs guide"
          # tests-only — Quality Contributor.
          printf 'q\n' > tests/q.py && git add tests/q.py
          GIT_AUTHOR_DATE="2026-05-10T00:00:00Z" \
          GIT_COMMITTER_DATE="2026-05-10T00:00:00Z" \
          git -c user.name="Quality Contrib" -c user.email="quality@example.com" \
            commit -m "test: quality q"
          # ignore-list case — 'claude' is NOT a [bot] login, so its absence
          # from the rendered output proves config.ignore is honored (the
          # built-in [bot]-suffix filter would not catch it). Five commits so
          # it would dominate the sort if it weren't filtered.
          for i in 1 2 3 4 5; do
            printf '%s\n' "$i" > "src/claude_${i}.py"
            git add "src/claude_${i}.py"
            GIT_AUTHOR_DATE="2026-05-1${i}T00:00:00Z" \
            GIT_COMMITTER_DATE="2026-05-1${i}T00:00:00Z" \
            git -c user.name="claude" -c user.email="claude@example.com" \
              commit -m "test: claude ${i}"
          done
          # Write the FULL py-launch-blueprint config shape (in_place + marker
          # pair + columns_per_row:1 + markdown-list entry_template +
          # classification with combination + identity_map coalescing +
          # ignore list). The action source-of-truth here is the config
          # file; we deliberately leave the matching action inputs unset.
          out_dir="test-output/CP-GHA-020"
          cat > "$out_dir/.contributors.yml" <<'YAML'
          classifier: path
          output_file: test-output/CP-GHA-020/CONTRIBUTORS.md
          state_file: test-output/CP-GHA-020/.contributors.jsonl
          in_place: true
          in_place_marker_start: "<!-- contributors-please:start -->"
          in_place_marker_end: "<!-- contributors-please:end -->"
          entry_template: "- [{{name}}]({{profile}}) - {{title}} ({{commits}} commits)"
          columns_per_row: 1
          sort: contributions
          min_contributions: 1
          ignore:
            - Copilot
            - claude
            - github-actions[bot]
            - dependabot[bot]
            - release-please-smorinlabs[bot]
          classification:
            categories:
              - id: docs
                label: Documentation Contributor
                paths:
                  - "docs/**"
                  - "*.md"
                  - ".github/**"
              - id: quality
                label: Quality Contributor
                paths:
                  - "tests/**"
                  - "scripts/check-*"
                  - ".gitleaks.toml"
            default:
              id: code
              label: Code Contributor
            combinations:
              - id: project
                label: Project Contributor
                when: [docs, quality, code]
            multi_category_resolution: priority
          identity_map:
            - login: code-contrib
              emails:
                - code1@example.com
                - code2@example.com
            - login: polymath
              emails:
                - polymath@example.com
            - login: docs-contrib
              emails:
                - docs@example.com
            - login: quality-contrib
              emails:
                - quality@example.com
            - login: claude
              emails:
                - claude@example.com
          YAML
          # Seed the in-place target file with surrounding prose that must
          # survive verbatim across the render (proves in-place edit, not
          # whole-file replace).
          cat > "$out_dir/CONTRIBUTORS.md" <<'EOF'
          # Contributors

          Intro prose that must survive.

          <!-- contributors-please:start -->
          stale body
          <!-- contributors-please:end -->

          ## How to Contribute

          Footer prose that must survive.
          EOF
          # Snapshot prefix/suffix around the markers for byte-identical check.
          node <<'JS'
          const fs = require("fs");
          const path = "test-output/CP-GHA-020/CONTRIBUTORS.md";
          const text = fs.readFileSync(path, "utf8");
          const start = "<!-- contributors-please:start -->";
          const end = "<!-- contributors-please:end -->";
          fs.writeFileSync(`${path}.prefix`, text.slice(0, text.indexOf(start) + start.length));
          fs.writeFileSync(`${path}.suffix`, text.slice(text.indexOf(end)));
          JS
      - uses: actions/checkout@v6
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Run config-driven ingest+render
        id: contributors
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_020_API}" \
            'INPUT_CONFIG-FILE=test-output/CP-GHA-020/.contributors.yml' \
            'INPUT_MODE=commit' \
            'INPUT_DRY-RUN=false' \
            'INPUT_BOOTSTRAP=true' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Verify py-launch-blueprint-shape output
        run: |
          set -euo pipefail
          file=test-output/CP-GHA-020/CONTRIBUTORS.md
          # Surrounding content survives — in-place edit, not whole-file replace.
          grep -F "# Contributors" "$file"
          grep -F "Intro prose that must survive." "$file"
          grep -F "## How to Contribute" "$file"
          grep -F "Footer prose that must survive." "$file"
          grep -F "<!-- contributors-please:start -->" "$file"
          grep -F "<!-- contributors-please:end -->" "$file"
          # Entry-template shape: "- [<name>](<profile>) - <title> (<n> commits)".
          # NOTE: the action's GitHub client renders `name` as the login (it
          # overrides the API's name field with the login at fetch time), so
          # the rendered link text is the login string.
          # identity_map coalesced two emails ⇒ code-contrib has 4 commits.
          grep -F -- "- [code-contrib](" "$file" | grep -F "Code Contributor (4 commits)"
          # classification combination triggered ⇒ Project Contributor (3 commits).
          grep -F -- "- [polymath](" "$file" | grep -F "Project Contributor (3 commits)"
          # docs-only contributor classified as Documentation Contributor.
          grep -F -- "- [docs-contrib](" "$file" | grep -F "Documentation Contributor (2 commits)"
          # tests-only contributor classified as Quality Contributor.
          grep -F -- "- [quality-contrib](" "$file" | grep -F "Quality Contributor (1 commits)"
          # columns_per_row: 1 ⇒ one entry per line (no concatenated rows).
          entry_lines="$(grep -cE '^- \[' "$file")"
          test "$entry_lines" = "4"
          # ignore list honored — 'claude' has 5 commits and is NOT a [bot]
          # login; its absence proves config.ignore (not the implicit [bot]
          # filter) is what removed it.
          if grep -F -- "- [claude](" "$file"; then
            echo "ignore list not honored — 'claude' rendered" >&2
            exit 1
          fi
          # Stale in-place body was replaced.
          if grep -F "stale body" "$file"; then
            echo "in-place body was not replaced" >&2
            exit 1
          fi
          # sort: contributions descending — exact rendered order must be
          # code-contrib (4) → polymath (3) → docs-contrib (2) → quality-contrib (1).
          node <<'JS'
          const fs = require("fs");
          const path = "test-output/CP-GHA-020/CONTRIBUTORS.md";
          const text = fs.readFileSync(path, "utf8");
          const start = "<!-- contributors-please:start -->";
          const end = "<!-- contributors-please:end -->";
          const body = text.slice(text.indexOf(start) + start.length, text.indexOf(end));
          const entries = body.split("\n").filter(line => line.startsWith("- ["));
          const names = entries.map(line => line.match(/^- \[([^\]]+)\]/)[1]);
          const expected = ["code-contrib", "polymath", "docs-contrib", "quality-contrib"];
          if (JSON.stringify(names) !== JSON.stringify(expected)) {
            throw new Error(`sort order wrong: ${JSON.stringify(names)} expected ${JSON.stringify(expected)}`);
          }
          // Prefix/suffix around the markers must be byte-identical.
          if (fs.readFileSync(`${path}.prefix`, "utf8") !== text.slice(0, text.indexOf(start) + start.length)) {
            throw new Error("prefix changed");
          }
          if (fs.readFileSync(`${path}.suffix`, "utf8") !== text.slice(text.indexOf(end))) {
            throw new Error("suffix changed");
          }
          JS
          {
            echo "### CP-GHA-020"
            echo ""
            echo "- output: test-output/CP-GHA-020/CONTRIBUTORS.md"
            echo "- config-file: test-output/CP-GHA-020/.contributors.yml (full py-launch-blueprint shape: in_place + markers + columns_per_row:1 + markdown-list entry_template + classification + identity_map + ignore)"
            echo "- ingest: orphan branch with real git commits exercising identity_map coalescing, classification combination, ignore list"
            echo "- changed: ${{ steps.contributors.outputs.changed }}"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        with:
          name: cp-gha-020
          path: test-output/CP-GHA-020
          include-hidden-files: true
