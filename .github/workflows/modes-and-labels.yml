name: contributors-please modes and labels

on:
  workflow_dispatch:
    inputs:
      action_ref:
        description: contributors-please-action ref to test.
        required: false
        default: v1
      test_id:
        description: CP-GHA mode/label test ID to run, or all.
        required: false
        default: all
        type: choice
        options:
          - all
          - CP-GHA-021
          - CP-GHA-022
          - CP-GHA-023
          - CP-GHA-024
          - CP-GHA-025
          - CP-GHA-026

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: contributors-please-test-${{ github.ref }}
  cancel-in-progress: false

env:
  ACTION_PATH: .github/actions/contributors-please-action

jobs:
  cp-gha-021:
    name: CP-GHA-021 commit mode diff and no diff
    if: ${{ inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-021' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare fixture
        run: |
          set -euo pipefail
          git pull --ff-only origin "$GITHUB_REF_NAME"
          out_dir="test-output/CP-GHA-021"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          git rev-parse HEAD > "$out_dir/head-before.txt"
          cat > "$out_dir/.contributors.jsonl" <<'JSONL'
          {"login":"commit-mode-tester","name":"Commit Mode Tester","profile":"https://example.com/commit-mode-tester","avatar":"","source":"declared","pinned":true,"categories":["code"],"title":"Code Contributor","emoji":"code","commits":0,"first_seen":"2026-05-28","last_updated":"2026-05-28"}
          JSONL
          nohup node scripts/fake-github-api.mjs 18021 "$out_dir" commit-mode-bot 21021 > "$out_dir/server.log" 2>&1 &
          echo "$!" > "$out_dir/server.pid"
          for _ in {1..20}; do
            if curl -fsS http://127.0.0.1:18021/__ready >/dev/null; then
              break
            fi
            sleep 0.25
          done
          curl -fsS http://127.0.0.1:18021/__ready >/dev/null
          echo "CP_GHA_021_API=http://127.0.0.1:18021" >> "$GITHUB_ENV"
      - name: First commit-mode run
        id: first
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_021_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-021/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-021/.contributors.jsonl' \
            'INPUT_MODE=commit' \
            'INPUT_ENTRY-TEMPLATE={{login}}' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Second commit-mode run
        id: second
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_021_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-021/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-021/.contributors.jsonl' \
            'INPUT_MODE=commit' \
            'INPUT_ENTRY-TEMPLATE={{login}}' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Verify commit-mode behavior
        run: |
          set -euo pipefail
          git rev-parse HEAD > test-output/CP-GHA-021/head-after.txt
          git log --format=%H%n%s -3 > test-output/CP-GHA-021/git-history.txt
          test "${{ steps.first.outputs.changed }}" = "true"
          test -n "${{ steps.first.outputs.commit-sha }}"
          test "${{ steps.second.outputs.changed }}" = "false"
          test -z "${{ steps.second.outputs.commit-sha }}"
          grep -F "commit-mode-tester" test-output/CP-GHA-021/contributors.md
          {
            echo "### CP-GHA-021"
            echo ""
            echo "- output: test-output/CP-GHA-021/contributors.md"
            echo "- first-commit: ${{ steps.first.outputs.commit-sha }}"
            echo "- second-changed: ${{ steps.second.outputs.changed }}"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: cp-gha-021
          path: test-output/CP-GHA-021
          include-hidden-files: true

  cp-gha-022:
    name: CP-GHA-022 pull-request mode open update no diff
    needs: cp-gha-021
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-022') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare local PR fixture
        run: |
          set -euo pipefail
          git pull --ff-only origin "$GITHUB_REF_NAME"
          out_dir="test-output/CP-GHA-022"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          origin_dir="$RUNNER_TEMP/cp-gha-022-origin.git"
          rm -rf "$origin_dir"
          git init --bare "$origin_dir"
          git push "$origin_dir" "HEAD:$GITHUB_REF_NAME"
          git remote set-url origin "$origin_dir"
          printf '%s\n' "$origin_dir" > "$out_dir/local-origin.txt"
          cat > "$out_dir/.contributors.jsonl" <<'JSONL'
          {"login":"pr-mode-one","name":"PR Mode One","profile":"https://example.com/pr-mode-one","avatar":"","source":"declared","pinned":true,"categories":["docs"],"title":"Docs Contributor","emoji":"docs","commits":0,"first_seen":"2026-05-28","last_updated":"2026-05-28"}
          JSONL
          nohup node scripts/fake-github-api.mjs 18022 "$out_dir" pr-mode-bot 22022 > "$out_dir/server.log" 2>&1 &
          echo "$!" > "$out_dir/server.pid"
          for _ in {1..20}; do
            if curl -fsS http://127.0.0.1:18022/__ready >/dev/null; then
              break
            fi
            sleep 0.25
          done
          curl -fsS http://127.0.0.1:18022/__ready >/dev/null
          echo "CP_GHA_022_API=http://127.0.0.1:18022" >> "$GITHUB_ENV"
      - name: First pull-request run
        id: first
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_REF_NAME="$GITHUB_REF_NAME" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_022_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-022/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-022/.contributors.jsonl' \
            'INPUT_MODE=pull-request' \
            'INPUT_ENTRY-TEMPLATE={{login}}' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Prepare update fixture
        run: |
          set -euo pipefail
          git checkout "$GITHUB_REF_NAME"
          out_dir="test-output/CP-GHA-022"
          mkdir -p "$out_dir"
          cat > "$out_dir/.contributors.jsonl" <<'JSONL'
          {"login":"pr-mode-one","name":"PR Mode One","profile":"https://example.com/pr-mode-one","avatar":"","source":"declared","pinned":true,"categories":["docs"],"title":"Docs Contributor","emoji":"docs","commits":0,"first_seen":"2026-05-28","last_updated":"2026-05-28"}
          {"login":"pr-mode-two","name":"PR Mode Two","profile":"https://example.com/pr-mode-two","avatar":"","source":"declared","pinned":true,"categories":["code"],"title":"Code Contributor","emoji":"code","commits":0,"first_seen":"2026-05-28","last_updated":"2026-05-28"}
          JSONL
      - name: Second pull-request run
        id: second
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_REF_NAME="$GITHUB_REF_NAME" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_022_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-022/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-022/.contributors.jsonl' \
            'INPUT_MODE=pull-request' \
            'INPUT_ENTRY-TEMPLATE={{login}}' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Third no-diff pull-request run
        id: third
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_REF_NAME="$GITHUB_REF_NAME" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_022_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-022/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-022/.contributors.jsonl' \
            'INPUT_MODE=pull-request' \
            'INPUT_ENTRY-TEMPLATE={{login}}' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Verify pull-request behavior
        run: |
          set -euo pipefail
          test "${{ steps.first.outputs.pr-opened }}" = "true"
          test "${{ steps.second.outputs.pr-opened }}" = "true"
          test "${{ steps.third.outputs.pr-opened }}" = "false"
          test "${{ steps.first.outputs.pr-number }}" = "${{ steps.second.outputs.pr-number }}"
          test -n "${{ steps.first.outputs.pr-url }}"
          grep -F "pr-mode-two" test-output/CP-GHA-022/contributors.md
          git ls-remote origin refs/heads/contributors-please/update > test-output/CP-GHA-022/update-branch.txt
          cp test-output/CP-GHA-022/pull-request.json test-output/CP-GHA-022/pr-evidence.json
          {
            echo "### CP-GHA-022"
            echo ""
            echo "- output: test-output/CP-GHA-022/contributors.md"
            echo "- pr: ${{ steps.second.outputs.pr-url }}"
            echo "- third-changed: ${{ steps.third.outputs.changed }}"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: cp-gha-022
          path: test-output/CP-GHA-022
          include-hidden-files: true

  cp-gha-023:
    name: CP-GHA-023 expected-failure-human-pr-branch
    needs: cp-gha-022
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-023') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare human-authored PR branch
        run: |
          set -euo pipefail
          git pull --ff-only origin "$GITHUB_REF_NAME"
          out_dir="test-output/CP-GHA-023"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          origin_dir="$RUNNER_TEMP/cp-gha-023-origin.git"
          rm -rf "$origin_dir"
          git init --bare "$origin_dir"
          git push "$origin_dir" "HEAD:$GITHUB_REF_NAME"
          git remote set-url origin "$origin_dir"
          printf '%s\n' "$origin_dir" > "$out_dir/local-origin.txt"
          git checkout -B contributors-please/update
          printf 'human branch\n' > "$out_dir/human-branch.txt"
          git add "$out_dir/human-branch.txt"
          git -c user.name="human contributor" \
            -c user.email="human@example.com" \
            commit -m "test: human branch protection"
          git push origin HEAD:contributors-please/update
          git ls-remote origin refs/heads/contributors-please/update | awk '{print $1}' \
            > "$out_dir/branch-before.txt"
          git checkout "$GITHUB_REF_NAME"
          cat > "$out_dir/.contributors.jsonl" <<'JSONL'
          {"login":"branch-protection-control","name":"Branch Protection Control","profile":"https://example.com/branch-protection-control","avatar":"","source":"declared","pinned":true,"categories":["code"],"title":"Code Contributor","emoji":"code","commits":0,"first_seen":"2026-05-28","last_updated":"2026-05-28"}
          JSONL
          printf 'branch-protection-control\n' > "$out_dir/control-contributors.md"
          nohup node scripts/fake-github-api.mjs 18023 "$out_dir" branch-protection-bot 23023 > "$out_dir/server.log" 2>&1 &
          echo "$!" > "$out_dir/server.pid"
          for _ in {1..20}; do
            if curl -fsS http://127.0.0.1:18023/__ready >/dev/null; then
              break
            fi
            sleep 0.25
          done
          curl -fsS http://127.0.0.1:18023/__ready >/dev/null
          echo "CP_GHA_023_API=http://127.0.0.1:18023" >> "$GITHUB_ENV"
      - name: Run valid control
        id: control
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_023_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-023/control-contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-023/.contributors.jsonl' \
            'INPUT_MODE=check' \
            'INPUT_DRY-RUN=true' \
            'INPUT_ENTRY-TEMPLATE={{login}}' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: "EXPECTED FAILURE: human-authored PR branch"
        id: expected_failure
        run: |
          set +e
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_REF_NAME="$GITHUB_REF_NAME" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_023_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-023/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-023/.contributors.jsonl' \
            'INPUT_MODE=pull-request' \
            'INPUT_ENTRY-TEMPLATE={{login}}' \
            node .github/actions/contributors-please-action/dist/index.js > test-output/CP-GHA-023/expected-failure.log 2>&1
          status=$?
          set -e
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Assert expected failure occurred
        run: |
          set -euo pipefail
          git ls-remote origin refs/heads/contributors-please/update | awk '{print $1}' \
            > test-output/CP-GHA-023/branch-after.txt
          cmp test-output/CP-GHA-023/branch-before.txt test-output/CP-GHA-023/branch-after.txt
          test "${{ steps.expected_failure.outputs.status }}" != "0"
          grep -F "contains commits not authored by" test-output/CP-GHA-023/expected-failure.log
          {
            echo "expected_failure: true"
            echo "expected_error: branch contributors-please/update contains commits not authored by"
            echo "observed_status: ${{ steps.expected_failure.outputs.status }}"
            echo "control_output: test-output/CP-GHA-023/control-contributors.md"
            echo "artifact: cp-gha-023"
          } >> test-output/CP-GHA-023/expected-failure.log
          cat test-output/CP-GHA-023/expected-failure.log >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: cp-gha-023
          path: test-output/CP-GHA-023
          include-hidden-files: true

  cp-gha-024:
    name: CP-GHA-024 check mode diff comment and no diff
    needs: cp-gha-023
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-024') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare fake API and fixture
        run: |
          set -euo pipefail
          out_dir="test-output/CP-GHA-024"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          cat > "$out_dir/.contributors.jsonl" <<'JSONL'
          {"login":"check-mode-tester","name":"Check Mode Tester","profile":"https://example.com/check-mode-tester","avatar":"","source":"commit","pinned":false,"categories":["code"],"title":"Code Contributor","emoji":"code","commits":2,"first_seen":"2026-05-28","last_updated":"2026-05-28"}
          JSONL
          printf 'stale\n' > "$out_dir/control-contributors.md"
          cat > "$out_dir/event.json" <<'JSON'
          {"pull_request":{"number":24024}}
          JSON
          cat > "$out_dir/server.mjs" <<'JS'
          import http from "node:http";
          import fs from "node:fs";
          const outDir = "test-output/CP-GHA-024";
          const comments = [];
          const server = http.createServer(async (req, res) => {
            const url = new URL(req.url ?? "/", "http://127.0.0.1");
            fs.appendFileSync(`${outDir}/api.log`, `${req.method} ${url.pathname}${url.search}\n`);
            if (url.pathname === "/user") return json(res, { login: "check-mode-bot", id: 24024 });
            if (url.pathname.endsWith("/contributors")) return json(res, []);
            if (url.pathname.endsWith("/issues/24024/comments") && req.method === "GET") return json(res, comments);
            if (url.pathname.endsWith("/issues/24024/comments") && req.method === "POST") {
              const body = JSON.parse(await readBody(req));
              comments.push({ id: 1, body: body.body });
              fs.writeFileSync(`${outDir}/comment-body.md`, body.body);
              return json(res, comments[0], 201);
            }
            if (url.pathname.endsWith("/issues/comments/1") && req.method === "PATCH") {
              const body = JSON.parse(await readBody(req));
              comments[0] = { id: 1, body: body.body };
              fs.writeFileSync(`${outDir}/comment-body.md`, body.body);
              return json(res, comments[0]);
            }
            json(res, { error: "not found", path: url.pathname }, 404);
          });
          server.listen(18024, "127.0.0.1");
          function json(res, value, status = 200) {
            res.writeHead(status, { "content-type": "application/json" });
            res.end(JSON.stringify(value));
          }
          function readBody(req) {
            return new Promise(resolve => {
              let data = "";
              req.on("data", chunk => { data += chunk; });
              req.on("end", () => resolve(data));
            });
          }
          JS
          nohup node "$out_dir/server.mjs" > "$out_dir/server.log" 2>&1 &
          echo "$!" > "$out_dir/server.pid"
          for _ in {1..20}; do
            if curl -fsS http://127.0.0.1:18024/user >/dev/null; then
              break
            fi
            sleep 0.25
          done
          curl -fsS http://127.0.0.1:18024/user >/dev/null
          echo "CP_GHA_024_API=http://127.0.0.1:18024" >> "$GITHUB_ENV"
      - name: "EXPECTED FAILURE: check mode stale output"
        id: expected_failure
        continue-on-error: true
        uses: ./.github/actions/contributors-please-action
        env:
          GITHUB_EVENT_NAME: pull_request
          GITHUB_EVENT_PATH: test-output/CP-GHA-024/event.json
        with:
          pat: fake-token
          github-api-url: ${{ env.CP_GHA_024_API }}
          output-file: test-output/CP-GHA-024/control-contributors.md
          state-file: test-output/CP-GHA-024/.contributors.jsonl
          mode: check
          entry-template: "{{login}}"
          min-contributions: "1"
      - name: Exercise PR comment path with action entrypoint
        run: |
          set -euo pipefail
          rm -f test-output/CP-GHA-024/comment-body.md
          set +e
          env \
            GITHUB_ACTIONS=true \
            GITHUB_EVENT_NAME=pull_request \
            GITHUB_EVENT_PATH="$PWD/test-output/CP-GHA-024/event.json" \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_024_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-024/control-contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-024/.contributors.jsonl' \
            'INPUT_MODE=check' \
            'INPUT_DRY-RUN=false' \
            'INPUT_BOOTSTRAP=false' \
            'INPUT_ENTRY-TEMPLATE={{login}}' \
            'INPUT_MIN-CONTRIBUTIONS=1' \
            node .github/actions/contributors-please-action/dist/index.js
          status="$?"
          set -e
          test "$status" != "0"
          grep -F "contributors-please found stale generated contributor files" test-output/CP-GHA-024/comment-body.md
          {
            echo "expected_failure: true"
            echo "expected_error: contributors-please check failed"
            echo "observed_status: $status"
            echo "comment_body: test-output/CP-GHA-024/comment-body.md"
          } > test-output/CP-GHA-024/expected-failure.log
      - name: Prepare no-diff output
        run: printf 'check-mode-tester\n' > test-output/CP-GHA-024/control-contributors.md
      - name: No-diff check-mode run
        id: no_diff
        uses: ./.github/actions/contributors-please-action
        env:
          GITHUB_EVENT_NAME: pull_request
          GITHUB_EVENT_PATH: test-output/CP-GHA-024/event.json
        with:
          pat: fake-token
          github-api-url: ${{ env.CP_GHA_024_API }}
          output-file: test-output/CP-GHA-024/control-contributors.md
          state-file: test-output/CP-GHA-024/.contributors.jsonl
          mode: check
          entry-template: "{{login}}"
          min-contributions: "1"
      - name: Verify check-mode behavior
        run: |
          set -euo pipefail
          test "${{ steps.expected_failure.outcome }}" = "failure"
          test "${{ steps.no_diff.outputs.changed }}" = "false"
          grep -F "contributors-please found stale generated contributor files" test-output/CP-GHA-024/comment-body.md
          grep -F "expected_failure: true" test-output/CP-GHA-024/expected-failure.log
          git diff --exit-code -- test-output/CP-GHA-024/control-contributors.md
          {
            echo "### CP-GHA-024"
            echo ""
            echo "- control_output: test-output/CP-GHA-024/control-contributors.md"
            echo "- expected_failure: check-mode stale output"
            echo "- no_diff_changed: ${{ steps.no_diff.outputs.changed }}"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: cp-gha-024
          path: test-output/CP-GHA-024
          include-hidden-files: true

  cp-gha-025:
    name: CP-GHA-025 dry-run side-effect suppression
    needs: cp-gha-024
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-025') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare fake API and dry-run fixtures
        run: |
          set -euo pipefail
          out_dir="test-output/CP-GHA-025"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          for mode in control commit pull-request check; do
            cat > "$out_dir/${mode}.jsonl" <<'JSONL'
          {"login":"dry-run-tester","name":"Dry Run Tester","profile":"https://example.com/dry-run-tester","avatar":"","source":"commit","pinned":false,"categories":["code"],"title":"Code Contributor","emoji":"code","commits":2,"first_seen":"2026-05-28","last_updated":"2026-05-28"}
          JSONL
          done
          nohup node scripts/fake-github-api.mjs 18025 "$out_dir" dry-run-bot 25025 > "$out_dir/server.log" 2>&1 &
          echo "$!" > "$out_dir/server.pid"
          for _ in {1..20}; do
            if curl -fsS http://127.0.0.1:18025/__ready >/dev/null; then
              break
            fi
            sleep 0.25
          done
          curl -fsS http://127.0.0.1:18025/__ready >/dev/null
          echo "CP_GHA_025_API=http://127.0.0.1:18025" >> "$GITHUB_ENV"
      - name: Non-dry-run control output
        run: |
          set -euo pipefail
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_025_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-025/control-contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-025/control.jsonl' \
            'INPUT_MODE=commit' \
            'INPUT_DRY-RUN=false' \
            'INPUT_BOOTSTRAP=false' \
            'INPUT_ENTRY-TEMPLATE={{login}}' \
            'INPUT_MIN-CONTRIBUTIONS=1' \
            node .github/actions/contributors-please-action/dist/index.js
          grep -F "dry-run-tester" test-output/CP-GHA-025/control-contributors.md
          git rev-parse HEAD > test-output/CP-GHA-025/head-before.txt
      - name: Dry-run commit mode
        id: commit_mode
        uses: ./.github/actions/contributors-please-action
        with:
          pat: fake-token
          github-api-url: ${{ env.CP_GHA_025_API }}
          output-file: test-output/CP-GHA-025/commit-contributors.md
          state-file: test-output/CP-GHA-025/commit.jsonl
          mode: commit
          dry-run: "true"
          entry-template: "{{login}}"
          min-contributions: "1"
      - name: Dry-run pull-request mode
        id: pr_mode
        uses: ./.github/actions/contributors-please-action
        with:
          pat: fake-token
          github-api-url: ${{ env.CP_GHA_025_API }}
          output-file: test-output/CP-GHA-025/pr-contributors.md
          state-file: test-output/CP-GHA-025/pull-request.jsonl
          mode: pull-request
          dry-run: "true"
          entry-template: "{{login}}"
          min-contributions: "1"
      - name: Dry-run check mode
        id: check_mode
        uses: ./.github/actions/contributors-please-action
        with:
          pat: fake-token
          github-api-url: ${{ env.CP_GHA_025_API }}
          output-file: test-output/CP-GHA-025/check-contributors.md
          state-file: test-output/CP-GHA-025/check.jsonl
          mode: check
          dry-run: "true"
          entry-template: "{{login}}"
          min-contributions: "1"
      - name: Verify dry-run behavior
        run: |
          set -euo pipefail
          git rev-parse HEAD > test-output/CP-GHA-025/head-after.txt
          cmp test-output/CP-GHA-025/head-before.txt test-output/CP-GHA-025/head-after.txt
          test "${{ steps.commit_mode.outputs.changed }}" = "true"
          test "${{ steps.pr_mode.outputs.changed }}" = "true"
          test "${{ steps.pr_mode.outputs.pr-opened }}" = "false"
          test "${{ steps.check_mode.outputs.changed }}" = "true"
          test ! -f test-output/CP-GHA-025/commit-contributors.md
          test ! -f test-output/CP-GHA-025/pr-contributors.md
          test ! -f test-output/CP-GHA-025/check-contributors.md
          {
            echo "### CP-GHA-025"
            echo ""
            echo "- control_output: test-output/CP-GHA-025/control-contributors.md"
            echo "- dry-run outputs intentionally absent for commit, pull-request, and check"
            echo "- commit-changed: ${{ steps.commit_mode.outputs.changed }}"
            echo "- pr-opened: ${{ steps.pr_mode.outputs.pr-opened }}"
            echo "- check-changed: ${{ steps.check_mode.outputs.changed }}"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: cp-gha-025
          path: test-output/CP-GHA-025
          include-hidden-files: true

  cp-gha-026:
    name: CP-GHA-026 PR labeling lifecycle
    needs: cp-gha-025
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-026') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare label lifecycle fixture
        run: |
          set -euo pipefail
          git pull --ff-only origin "$GITHUB_REF_NAME"
          out_dir="test-output/CP-GHA-026"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          origin_dir="$RUNNER_TEMP/cp-gha-026-origin.git"
          rm -rf "$origin_dir"
          git init --bare "$origin_dir"
          git push "$origin_dir" "HEAD:$GITHUB_REF_NAME"
          git remote set-url origin "$origin_dir"
          printf '%s\n' "$origin_dir" > "$out_dir/local-origin.txt"
          cat > "$out_dir/.contributors.jsonl" <<'JSONL'
          {"login":"label-lifecycle-one","name":"Label Lifecycle One","profile":"https://example.com/label-lifecycle-one","avatar":"","source":"declared","pinned":true,"categories":["code"],"title":"Code Contributor","emoji":"code","commits":0,"first_seen":"2026-05-28","last_updated":"2026-05-28"}
          JSONL
          nohup node scripts/fake-github-api.mjs 18026 "$out_dir" label-bot 26026 > "$out_dir/server.log" 2>&1 &
          echo "$!" > "$out_dir/server.pid"
          for _ in {1..20}; do
            if curl -fsS http://127.0.0.1:18026/__ready >/dev/null; then
              break
            fi
            sleep 0.25
          done
          curl -fsS http://127.0.0.1:18026/__ready >/dev/null
          echo "CP_GHA_026_API=http://127.0.0.1:18026" >> "$GITHUB_ENV"
      - name: Open PR with label
        id: first
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_REF_NAME="$GITHUB_REF_NAME" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_026_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-026/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-026/.contributors.jsonl' \
            'INPUT_MODE=pull-request' \
            'INPUT_ENTRY-TEMPLATE={{login}}' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Prepare reapply fixture
        run: |
          set -euo pipefail
          test "${{ steps.first.outputs.pr-opened }}" = "true"
          cp test-output/CP-GHA-026/issue-labels.json test-output/CP-GHA-026/issue-labels-after-first.json
          printf '[]\n' > test-output/CP-GHA-026/issue-labels.json
          git checkout "$GITHUB_REF_NAME"
          cat > test-output/CP-GHA-026/.contributors.jsonl <<'JSONL'
          {"login":"label-lifecycle-one","name":"Label Lifecycle One","profile":"https://example.com/label-lifecycle-one","avatar":"","source":"declared","pinned":true,"categories":["code"],"title":"Code Contributor","emoji":"code","commits":0,"first_seen":"2026-05-28","last_updated":"2026-05-28"}
          {"login":"label-lifecycle-two","name":"Label Lifecycle Two","profile":"https://example.com/label-lifecycle-two","avatar":"","source":"declared","pinned":true,"categories":["docs"],"title":"Docs Contributor","emoji":"docs","commits":0,"first_seen":"2026-05-28","last_updated":"2026-05-28"}
          JSONL
      - name: Reapply label
        id: reapply
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_REF_NAME="$GITHUB_REF_NAME" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_026_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-026/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-026/.contributors.jsonl' \
            'INPUT_MODE=pull-request' \
            'INPUT_ENTRY-TEMPLATE={{login}}' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Prepare skip-labeling fixture
        run: |
          set -euo pipefail
          test "${{ steps.first.outputs.pr-number }}" = "${{ steps.reapply.outputs.pr-number }}"
          cp test-output/CP-GHA-026/issue-labels.json test-output/CP-GHA-026/issue-labels-after-reapply.json
          grep -c '/labels' test-output/CP-GHA-026/api.log > test-output/CP-GHA-026/label-api-count-before-skip.txt
          git checkout "$GITHUB_REF_NAME"
          cat > test-output/CP-GHA-026/.contributors.jsonl <<'JSONL'
          {"login":"label-lifecycle-three","name":"Label Lifecycle Three","profile":"https://example.com/label-lifecycle-three","avatar":"","source":"declared","pinned":true,"categories":["code"],"title":"Code Contributor","emoji":"code","commits":0,"first_seen":"2026-05-28","last_updated":"2026-05-28"}
          JSONL
      - name: Run with skip-labeling
        id: skip
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_REF_NAME="$GITHUB_REF_NAME" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_026_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-026/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-026/.contributors.jsonl' \
            'INPUT_MODE=pull-request' \
            'INPUT_SKIP-LABELING=true' \
            'INPUT_ENTRY-TEMPLATE={{login}}' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Verify label lifecycle
        run: |
          set -euo pipefail
          test "${{ steps.first.outputs.pr-opened }}" = "true"
          test "${{ steps.reapply.outputs.pr-opened }}" = "true"
          test "${{ steps.skip.outputs.pr-opened }}" = "true"
          grep -F "label-lifecycle-three" test-output/CP-GHA-026/contributors.md
          node <<'JS'
          const fs = require("fs");
          const afterFirst = JSON.parse(fs.readFileSync("test-output/CP-GHA-026/issue-labels-after-first.json", "utf8"));
          const afterReapply = JSON.parse(fs.readFileSync("test-output/CP-GHA-026/issue-labels-after-reapply.json", "utf8"));
          if (afterFirst.length !== 1 || afterReapply.length !== 1) {
            throw new Error(`unexpected issue label events: first=${afterFirst.length} reapply=${afterReapply.length}`);
          }
          if (!afterReapply[0].labels.includes("contributors-please: pending")) {
            throw new Error("pending label was not reapplied");
          }
          JS
          before="$(cat test-output/CP-GHA-026/label-api-count-before-skip.txt)"
          after="$(grep -c '/labels' test-output/CP-GHA-026/api.log)"
          test "$before" = "$after"
          cp test-output/CP-GHA-026/pull-request.json test-output/CP-GHA-026/pr-evidence.json
          {
            echo "### CP-GHA-026"
            echo ""
            echo "- output: test-output/CP-GHA-026/contributors.md"
            echo "- pr: ${{ steps.reapply.outputs.pr-url }}"
            echo "- skip-labeling-pr: ${{ steps.skip.outputs.pr-url }}"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: cp-gha-026
          path: test-output/CP-GHA-026
          include-hidden-files: true
