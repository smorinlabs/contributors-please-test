name: contributors-please classification and state

run-name: ${{ github.workflow }} ${{ inputs.test_id || 'all' }} suite ${{ inputs.suite_run_id || github.run_id }} action ${{ inputs.action_ref || 'v1' }}

on:
  workflow_dispatch:
    inputs:
      action_ref:
        description: contributors-please-action ref to test.
        required: false
        default: v1
      suite_run_id:
        description: Optional downstream suite run ID for orchestrator correlation.
        required: false
        default: manual
      test_id:
        description: CP-GHA classification/state test ID to run, or all.
        required: false
        default: all
        type: choice
        options:
          - all
          - CP-GHA-007
          - CP-GHA-008
          - CP-GHA-009
          - CP-GHA-010
          - CP-GHA-011
          - CP-GHA-012
          - CP-GHA-013
          - CP-GHA-019
          - CP-GHA-020

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: contributors-please-test-${{ github.ref }}
  cancel-in-progress: false

env:
  ACTION_PATH: .github/actions/contributors-please-action

jobs:
  cp-gha-007:
    name: CP-GHA-007 default classifier
    if: ${{ inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-007' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare discovered contributor fixture
        run: |
          set -euo pipefail
          git pull --ff-only origin "$GITHUB_REF_NAME"
          out_dir="test-output/CP-GHA-007"
          rm -rf "$out_dir"
          mkdir -p "$out_dir" src docs tests
          cat > "$out_dir/api-contributors.json" <<'JSON'
          [{"login":"default-classifier-tester","contributions":3,"avatar_url":"https://example.com/default.png","html_url":"https://example.com/default-classifier-tester"}]
          JSON
          commit_fixture() {
            local path="$1"
            local content="$2"
            local message="$3"
            printf '%s\n' "$content" > "$path"
            git add "$path"
            GIT_AUTHOR_DATE="2026-05-01T12:00:00Z" \
              GIT_COMMITTER_DATE="2026-05-01T12:00:00Z" \
              git -c user.name="default-classifier-tester" \
                -c user.email="15007+default-classifier-tester@users.noreply.github.com" \
                commit -m "$message"
          }
          commit_fixture "src/cp-gha-007.ts" "export const cpGha007 = true;" "test: cp-gha-007 code fixture"
          commit_fixture "docs/cp-gha-007.md" "# CP-GHA-007" "test: cp-gha-007 docs fixture"
          commit_fixture "tests/cp-gha-007.test.ts" "test('cp-gha-007', () => expect(true).toBe(true));" "test: cp-gha-007 quality fixture"
          nohup node scripts/fake-github-api.mjs 18007 "$out_dir" render-bot-007 14007 > "$out_dir/server.log" 2>&1 &
          echo "$!" > "$out_dir/server.pid"
          for _ in {1..20}; do
            if curl -fsS http://127.0.0.1:18007/__ready >/dev/null; then
              break
            fi
            sleep 0.25
          done
          curl -fsS http://127.0.0.1:18007/__ready >/dev/null
          echo "CP_GHA_007_API=http://127.0.0.1:18007" >> "$GITHUB_ENV"
      - name: Run contributors-please
        id: contributors
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_007_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-007/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-007/.contributors.jsonl' \
            'INPUT_MODE=commit' \
            'INPUT_BOOTSTRAP=true' \
            'INPUT_ENTRY-TEMPLATE={{login}} {{title}} {{commits}}' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Verify default classifier
        run: |
          set -euo pipefail
          test "${{ steps.contributors.outputs.token-source }}" = "pat"
          grep -F "default-classifier-tester Rockstar 3" test-output/CP-GHA-007/contributors.md
          node <<'JS'
          const fs = require("fs");
          const record = JSON.parse(fs.readFileSync("test-output/CP-GHA-007/.contributors.jsonl", "utf8").trim());
          const expected = JSON.stringify(["code", "docs", "quality"]);
          if (record.title !== "Rockstar" || JSON.stringify(record.categories) !== expected) {
            throw new Error(`unexpected default classification: ${JSON.stringify(record)}`);
          }
          JS
          {
            echo "### CP-GHA-007"
            echo ""
            echo "- output: test-output/CP-GHA-007/contributors.md"
            echo "- token-source: ${{ steps.contributors.outputs.token-source }}"
            echo "- default-classifier: no config file was loaded"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: cp-gha-007
          path: test-output/CP-GHA-007
          include-hidden-files: true

  cp-gha-008:
    name: CP-GHA-008 custom classifier config
    needs: cp-gha-007
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-008') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare fixture
        run: |
          set -euo pipefail
          git pull --ff-only origin "$GITHUB_REF_NAME"
          out_dir="test-output/CP-GHA-008"
          rm -rf "$out_dir"
          mkdir -p "$out_dir" shared misc
          cat > "$out_dir/api-contributors.json" <<'JSON'
          [
            {"login":"catchall-tester","contributions":1,"avatar_url":"","html_url":"https://example.com/catchall-tester"},
            {"login":"precedence-tester","contributions":1,"avatar_url":"","html_url":"https://example.com/precedence-tester"}
          ]
          JSON
          cat > "$out_dir/.contributors.yml" <<'YAML'
          classification:
            categories:
              - id: first
                label: First Match
                emoji: first
                paths: ["shared/**"]
              - id: second
                label: Second Match
                emoji: second
                paths: ["shared/**"]
            default:
              id: other
              label: Other Match
              emoji: other
            combinations: []
            multi_category_resolution: priority
          entry_template: "{{login}} {{title}}"
          sort: alphabetical
          YAML
          printf 'first\n' > shared/cp-gha-008.txt
          git add shared/cp-gha-008.txt
          GIT_AUTHOR_DATE="2026-05-08T12:00:00Z" \
            GIT_COMMITTER_DATE="2026-05-08T12:00:00Z" \
            git -c user.name="precedence-tester" \
              -c user.email="15008+precedence-tester@users.noreply.github.com" \
              commit -m "test: cp-gha-008 precedence fixture"
          printf 'other\n' > misc/cp-gha-008.txt
          git add misc/cp-gha-008.txt
          GIT_AUTHOR_DATE="2026-05-08T12:01:00Z" \
            GIT_COMMITTER_DATE="2026-05-08T12:01:00Z" \
            git -c user.name="catchall-tester" \
              -c user.email="15009+catchall-tester@users.noreply.github.com" \
              commit -m "test: cp-gha-008 catchall fixture"
          nohup node scripts/fake-github-api.mjs 18008 "$out_dir" render-bot-008 14008 > "$out_dir/server.log" 2>&1 &
          echo "$!" > "$out_dir/server.pid"
          for _ in {1..20}; do
            if curl -fsS http://127.0.0.1:18008/__ready >/dev/null; then
              break
            fi
            sleep 0.25
          done
          curl -fsS http://127.0.0.1:18008/__ready >/dev/null
          echo "CP_GHA_008_API=http://127.0.0.1:18008" >> "$GITHUB_ENV"
      - name: Run contributors-please
        id: contributors
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_008_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-008/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-008/.contributors.jsonl' \
            'INPUT_CONFIG-FILE=test-output/CP-GHA-008/.contributors.yml' \
            'INPUT_MODE=commit' \
            'INPUT_BOOTSTRAP=true' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Verify custom config accepted
        run: |
          set -euo pipefail
          grep -F "catchall-tester Other Match" test-output/CP-GHA-008/contributors.md
          grep -F "precedence-tester First Match" test-output/CP-GHA-008/contributors.md
          node <<'JS'
          const fs = require("fs");
          const records = fs.readFileSync("test-output/CP-GHA-008/.contributors.jsonl", "utf8").trim().split(/\n/).map(JSON.parse);
          const byLogin = Object.fromEntries(records.map(record => [record.login, record]));
          if (JSON.stringify(byLogin["precedence-tester"].categories) !== JSON.stringify(["first"])) {
            throw new Error("precedence path was not claimed by first matching category");
          }
          if (JSON.stringify(byLogin["catchall-tester"].categories) !== JSON.stringify(["other"])) {
            throw new Error("unmatched path did not use configured default category");
          }
          JS
          {
            echo "### CP-GHA-008"
            echo ""
            echo "- output: test-output/CP-GHA-008/contributors.md"
            echo "- precedence: shared path matched the first category only"
            echo "- catch-all: misc path used the configured default category"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: cp-gha-008
          path: test-output/CP-GHA-008
          include-hidden-files: true

  cp-gha-009:
    name: CP-GHA-009 combination title config
    needs: cp-gha-008
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-009') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare fixture
        run: |
          set -euo pipefail
          git pull --ff-only origin "$GITHUB_REF_NAME"
          out_dir="test-output/CP-GHA-009"
          rm -rf "$out_dir"
          mkdir -p "$out_dir" docs tests src
          cat > "$out_dir/api-contributors.json" <<'JSON'
          [
            {"login":"combine-tester","contributions":2,"avatar_url":"","html_url":"https://example.com/combine-tester"},
            {"login":"combo-tester","contributions":3,"avatar_url":"","html_url":"https://example.com/combo-tester"},
            {"login":"single-tester","contributions":1,"avatar_url":"","html_url":"https://example.com/single-tester"}
          ]
          JSON
          cat > "$out_dir/.contributors.yml" <<'YAML'
          classification:
            categories:
              - id: docs
                label: Docs Label
                emoji: docs
                paths: ["docs/**"]
              - id: quality
                label: Quality Label
                emoji: test
                paths: ["tests/**"]
            default:
              id: code
              label: Code Label
              emoji: code
            combinations:
              - id: first-combo
                label: First Combo
                emoji: first
                when: ["docs", "quality"]
              - id: all-three
                label: All Three
                emoji: star
                when: ["docs", "quality", "code"]
            multi_category_resolution: combine
          entry_template: "{{login}} {{title}}"
          sort: alphabetical
          YAML
          commit_fixture() {
            local login="$1"
            local id="$2"
            local date="$3"
            local path="$4"
            local content="$5"
            local message="$6"
            printf '%s\n' "$content" > "$path"
            git add "$path"
            GIT_AUTHOR_DATE="${date}T12:00:00Z" \
              GIT_COMMITTER_DATE="${date}T12:00:00Z" \
              git -c user.name="$login" \
                -c user.email="${id}+${login}@users.noreply.github.com" \
                commit -m "$message"
          }
          commit_fixture "combo-tester" 15010 "2026-05-09" "docs/cp-gha-009-combo.md" "combo docs" "test: cp-gha-009 combo docs"
          commit_fixture "combo-tester" 15010 "2026-05-10" "tests/cp-gha-009-combo.test.ts" "combo tests" "test: cp-gha-009 combo tests"
          commit_fixture "combo-tester" 15010 "2026-05-11" "src/cp-gha-009-combo.ts" "combo code" "test: cp-gha-009 combo code"
          commit_fixture "combine-tester" 15011 "2026-05-12" "docs/cp-gha-009-combine.md" "combine docs" "test: cp-gha-009 combine docs"
          commit_fixture "combine-tester" 15011 "2026-05-13" "src/cp-gha-009-combine.ts" "combine code" "test: cp-gha-009 combine code"
          commit_fixture "single-tester" 15012 "2026-05-14" "docs/cp-gha-009-single.md" "single docs" "test: cp-gha-009 single docs"
          nohup node scripts/fake-github-api.mjs 18009 "$out_dir" render-bot-009 14009 > "$out_dir/server.log" 2>&1 &
          echo "$!" > "$out_dir/server.pid"
          for _ in {1..20}; do
            if curl -fsS http://127.0.0.1:18009/__ready >/dev/null; then
              break
            fi
            sleep 0.25
          done
          curl -fsS http://127.0.0.1:18009/__ready >/dev/null
          echo "CP_GHA_009_API=http://127.0.0.1:18009" >> "$GITHUB_ENV"
      - name: Run contributors-please
        id: contributors
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_009_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-009/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-009/.contributors.jsonl' \
            'INPUT_CONFIG-FILE=test-output/CP-GHA-009/.contributors.yml' \
            'INPUT_MODE=commit' \
            'INPUT_BOOTSTRAP=true' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Verify title resolution
        run: |
          set -euo pipefail
          grep -F "combine-tester Docs Label / Code Label" test-output/CP-GHA-009/contributors.md
          grep -F "combo-tester First Combo" test-output/CP-GHA-009/contributors.md
          grep -F "single-tester Docs Label" test-output/CP-GHA-009/contributors.md
          if grep -F "combo-tester All Three" test-output/CP-GHA-009/contributors.md; then
            echo "later combination rule won unexpectedly" >&2
            exit 1
          fi
          node <<'JS'
          const fs = require("fs");
          const records = fs.readFileSync("test-output/CP-GHA-009/.contributors.jsonl", "utf8").trim().split(/\n/).map(JSON.parse);
          const byLogin = Object.fromEntries(records.map(record => [record.login, record]));
          const expected = {
            "combine-tester": "Docs Label / Code Label",
            "combo-tester": "First Combo",
            "single-tester": "Docs Label",
          };
          for (const [login, title] of Object.entries(expected)) {
            if (byLogin[login]?.title !== title) {
              throw new Error(`${login} title mismatch: ${byLogin[login]?.title}`);
            }
          }
          JS
          {
            echo "### CP-GHA-009"
            echo ""
            echo "- output: test-output/CP-GHA-009/contributors.md"
            echo "- first matching combination rule won for combo-tester"
            echo "- multi-category combine mode rendered combine-tester"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: cp-gha-009
          path: test-output/CP-GHA-009
          include-hidden-files: true

  cp-gha-010:
    name: CP-GHA-010 expected-failure-invalid-classifier
    needs: cp-gha-009
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-010') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare fixture
        run: |
          set -euo pipefail
          git pull --ff-only origin "$GITHUB_REF_NAME"
          out_dir="test-output/CP-GHA-010"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          cat > "$out_dir/.contributors.jsonl" <<'JSONL'
          {"login":"classifier-control","name":"Classifier Control","profile":"https://example.com/classifier-control","avatar":"","source":"commit","pinned":false,"categories":["code"],"title":"Code Contributor","emoji":"code","commits":2,"first_seen":"2026-05-28","last_updated":"2026-05-28"}
          JSONL
          cat > "$out_dir/invalid.yml" <<'YAML'
          classifier: reviews
          YAML
          nohup node scripts/fake-github-api.mjs 18010 "$out_dir" render-bot-010 14010 > "$out_dir/server.log" 2>&1 &
          echo "$!" > "$out_dir/server.pid"
          for _ in {1..20}; do
            if curl -fsS http://127.0.0.1:18010/__ready >/dev/null; then
              break
            fi
            sleep 0.25
          done
          curl -fsS http://127.0.0.1:18010/__ready >/dev/null
          echo "CP_GHA_010_API=http://127.0.0.1:18010" >> "$GITHUB_ENV"
      - name: Run valid control
        id: control
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_010_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-010/control-contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-010/.contributors.jsonl' \
            'INPUT_MODE=commit' \
            'INPUT_ENTRY-TEMPLATE={{login}}' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: "EXPECTED FAILURE: invalid classifier"
        id: expected_failure
        run: |
          set +e
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_010_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-010/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-010/.contributors.jsonl' \
            'INPUT_CONFIG-FILE=test-output/CP-GHA-010/invalid.yml' \
            'INPUT_MODE=commit' \
            node .github/actions/contributors-please-action/dist/index.js > test-output/CP-GHA-010/expected-failure.log 2>&1
          status=$?
          set -e
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Assert expected failure occurred
        run: |
          set -euo pipefail
          test "${{ steps.expected_failure.outputs.status }}" != "0"
          grep -F 'Unsupported classifier "reviews"; valid values for v1: path' test-output/CP-GHA-010/expected-failure.log
          grep -F "classifier-control" test-output/CP-GHA-010/control-contributors.md
          test ! -f test-output/CP-GHA-010/contributors.md
          {
            echo "expected_failure: true"
            echo 'expected_error: Unsupported classifier "reviews"; valid values for v1: path'
            echo "observed_status: ${{ steps.expected_failure.outputs.status }}"
            echo "control_output: test-output/CP-GHA-010/control-contributors.md"
            echo "artifact: cp-gha-010"
          } >> test-output/CP-GHA-010/expected-failure.log
          cat test-output/CP-GHA-010/expected-failure.log >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: cp-gha-010
          path: test-output/CP-GHA-010
          include-hidden-files: true

  cp-gha-011:
    name: CP-GHA-011 declared pinned contributor
    needs: cp-gha-010
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-011') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare fixture
        run: |
          set -euo pipefail
          git pull --ff-only origin "$GITHUB_REF_NAME"
          out_dir="test-output/CP-GHA-011"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          cat > "$out_dir/.contributors.jsonl" <<'JSONL'
          {"login":"declared-designer","name":"Declared Designer","profile":"https://example.com/declared-designer","avatar":"","source":"declared","pinned":true,"categories":["design"],"title":"Design Lead","emoji":"design","commits":0,"first_seen":"2026-05-28","last_updated":"2026-05-28"}
          JSONL
          cp "$out_dir/.contributors.jsonl" "$out_dir/state.before.jsonl"
          nohup node scripts/fake-github-api.mjs 18011 "$out_dir" render-bot-011 14011 > "$out_dir/server.log" 2>&1 &
          echo "$!" > "$out_dir/server.pid"
          for _ in {1..20}; do
            if curl -fsS http://127.0.0.1:18011/__ready >/dev/null; then
              break
            fi
            sleep 0.25
          done
          curl -fsS http://127.0.0.1:18011/__ready >/dev/null
          echo "CP_GHA_011_API=http://127.0.0.1:18011" >> "$GITHUB_ENV"
      - name: Run contributors-please
        id: contributors
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_011_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-011/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-011/.contributors.jsonl' \
            'INPUT_MODE=commit' \
            'INPUT_ENTRY-TEMPLATE={{login}} {{title}} {{commits}}' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Run idempotency check
        id: second_run
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_011_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-011/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-011/.contributors.jsonl' \
            'INPUT_MODE=commit' \
            'INPUT_ENTRY-TEMPLATE={{login}} {{title}} {{commits}}' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Verify declared pinned record
        run: |
          set -euo pipefail
          test "${{ steps.second_run.outputs.changed }}" = "false"
