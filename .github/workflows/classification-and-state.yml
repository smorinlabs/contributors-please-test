  cp-gha-012:
    name: CP-GHA-012 declared contributor later appears
    needs: cp-gha-011
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-012') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare declared state and matching commit
        run: |
          set -euo pipefail
          git pull --ff-only origin "$GITHUB_REF_NAME"
          out_dir="test-output/CP-GHA-012"
          rm -rf "$out_dir"
          mkdir -p "$out_dir" src
          cat > "$out_dir/api-contributors.json" <<'JSON'
          [{"login":"declared-later","contributions":1,"avatar_url":"","html_url":"https://example.com/declared-later"}]
          JSON
          cat > "$out_dir/.contributors.jsonl" <<'JSONL'
          {"login":"declared-later","name":"Declared Later","profile":"https://example.com/declared-later","avatar":"","source":"declared","pinned":true,"categories":["design"],"title":"Declared Title","emoji":"design","commits":0,"first_seen":"2026-05-01","last_updated":"2026-05-01"}
          JSONL
          cp "$out_dir/.contributors.jsonl" "$out_dir/state.before.jsonl"
          printf 'export const cpGha012 = true;\n' > src/cp-gha-012.ts
          git add src/cp-gha-012.ts
          GIT_AUTHOR_DATE="2026-05-20T12:00:00Z" \
            GIT_COMMITTER_DATE="2026-05-20T12:00:00Z" \
            git -c user.name="declared-later" \
              -c user.email="15012+declared-later@users.noreply.github.com" \
              commit -m "test: cp-gha-012 declared contributor appears"
          nohup node scripts/fake-github-api.mjs 18012 "$out_dir" render-bot-012 14012 > "$out_dir/server.log" 2>&1 &
          echo "$!" > "$out_dir/server.pid"
          for _ in {1..20}; do
            if curl -fsS http://127.0.0.1:18012/__ready >/dev/null; then
              break
            fi
            sleep 0.25
          done
          curl -fsS http://127.0.0.1:18012/__ready >/dev/null
          echo "CP_GHA_012_API=http://127.0.0.1:18012" >> "$GITHUB_ENV"
      - name: Run contributors-please
        id: contributors
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_012_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-012/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-012/.contributors.jsonl' \
            'INPUT_MODE=commit' \
            'INPUT_ENTRY-TEMPLATE={{login}} {{title}} {{commits}}' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Verify declared source is preserved
        run: |
          set -euo pipefail
          grep -F "declared-later Declared Title 1" test-output/CP-GHA-012/contributors.md
          node <<'JS'
          const fs = require("fs");
          const before = JSON.parse(fs.readFileSync("test-output/CP-GHA-012/state.before.jsonl", "utf8").trim());
          const after = JSON.parse(fs.readFileSync("test-output/CP-GHA-012/.contributors.jsonl", "utf8").trim());
          for (const key of ["login", "source", "pinned", "title", "emoji", "first_seen"]) {
            if (JSON.stringify(before[key]) !== JSON.stringify(after[key])) {
              throw new Error(`${key} changed unexpectedly`);
            }
          }
          if (JSON.stringify(after.categories) !== JSON.stringify(["design"])) {
            throw new Error(`categories changed unexpectedly: ${JSON.stringify(after.categories)}`);
          }
          if (after.commits !== 1 || after.last_updated === before.last_updated) {
            throw new Error(`commit fields did not update as expected: ${JSON.stringify(after)}`);
          }
          JS
          {
            echo "### CP-GHA-012"
            echo ""
            echo "- output: test-output/CP-GHA-012/contributors.md"
            echo "- source and pinned fields preserved after commit discovery"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: cp-gha-012
          path: test-output/CP-GHA-012
          include-hidden-files: true

