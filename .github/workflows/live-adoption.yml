name: contributors-please live adoption

run-name: live adoption suite ${{ inputs.suite_run_id || github.run_id }} action-ref ${{ inputs.action_ref || 'main' }}

on:
  workflow_dispatch:
    inputs:
      action_ref:
        description: contributors-please-action ref to test.
        required: false
        default: main
      suite_run_id:
        description: Upstream run ID used to correlate downstream runs.
        required: false
        default: manual
      target_owner:
        description: Scratch repository owner.
        required: false
        default: smorinlabs
      target_repo:
        description: Scratch repository name.
        required: false
        default: contributors-please-e2e

permissions:
  contents: read

concurrency:
  group: contributors-please-live-adoption-${{ inputs.action_ref || github.run_id }}
  cancel-in-progress: true

env:
  ACTION_PATH: .github/actions/contributors-please-action
  TARGET_OWNER: ${{ inputs.target_owner || vars.CONTRIBUTORS_PLEASE_E2E_OWNER || 'smorinlabs' }}
  TARGET_REPO: ${{ inputs.target_repo || vars.CONTRIBUTORS_PLEASE_E2E_REPO || 'contributors-please-e2e' }}

jobs:
  live-adoption:
    name: Real scratch repository adoption
    runs-on: ubuntu-latest
    steps:
      - name: Verify target configuration
        env:
          TARGET_TOKEN: ${{ secrets.CONTRIBUTORS_PLEASE_E2E_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$TARGET_OWNER"
          test -n "$TARGET_REPO"
          test -n "$TARGET_TOKEN"

      - name: Checkout scratch repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.TARGET_OWNER }}/${{ env.TARGET_REPO }}
          token: ${{ secrets.CONTRIBUTORS_PLEASE_E2E_TOKEN }}
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve target actor
        id: target-actor
        env:
          GH_TOKEN: ${{ secrets.CONTRIBUTORS_PLEASE_E2E_TOKEN }}
        run: |
          set -euo pipefail
          login="$(gh api user --jq .login)"
          user_id="$(gh api user --jq .id)"
          test -n "$login"
          test -n "$user_id"
          {
            echo "login=$login"
            echo "email=${user_id}+${login}@users.noreply.github.com"
            echo "fixture-name=contributors-please live fixture"
            echo "fixture-email=${login}@users.noreply.github.com"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare clean live adoption baseline
        env:
          GH_TOKEN: ${{ secrets.CONTRIBUTORS_PLEASE_E2E_TOKEN }}
          E2E_LOGIN: ${{ steps.target-actor.outputs.login }}
          FIXTURE_NAME: ${{ steps.target-actor.outputs.fixture-name }}
          FIXTURE_EMAIL: ${{ steps.target-actor.outputs.fixture-email }}
        run: |
          set -euo pipefail
          mkdir -p test-output/live-adoption live-fixtures
          git config user.name "contributors-please live e2e"
          git config user.email "contributors-please-e2e@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${TARGET_OWNER}/${TARGET_REPO}.git"

          is_rate_limit_error() {
            grep -qiE 'rate limit|secondary rate|abuse detection' "$1"
          }

          list_stale_prs() {
            local rest_error="test-output/live-adoption/stale-pr-list-rest.err"
            if gh api --method GET "repos/${TARGET_OWNER}/${TARGET_REPO}/pulls" \
              -f state=open \
              -f head="${TARGET_OWNER}:contributors-please/update" \
              --jq '.[].number' 2>"${rest_error}"; then
              echo "Stale PR listing API path: REST" >&2
              return 0
            fi

            if is_rate_limit_error "${rest_error}"; then
              echo "Stale PR listing REST hit a rate limit; using GraphQL fallback." >&2
              gh pr list \
                --repo "$TARGET_OWNER/$TARGET_REPO" \
                --state open \
                --head contributors-please/update \
                --json number \
                --jq '.[].number'
              echo "Stale PR listing API path: GraphQL fallback" >&2
              return 0
            fi

            cat "${rest_error}" >&2
            return 1
          }

          close_stale_pr() {
            local pr_number="$1"
            local rest_error="test-output/live-adoption/stale-pr-cleanup-rest-${pr_number}.err"
            local comment="Closing stale contributors-please live adoption PR before run ${GITHUB_RUN_ID}."

            if gh api --method POST "repos/${TARGET_OWNER}/${TARGET_REPO}/issues/${pr_number}/comments" \
              -f body="${comment}" 2>"${rest_error}" &&
              gh api --method PATCH "repos/${TARGET_OWNER}/${TARGET_REPO}/pulls/${pr_number}" \
                -f state=closed 2>>"${rest_error}"; then
              echo "Stale PR cleanup API path: REST" >&2
              return 0
            fi

            if is_rate_limit_error "${rest_error}"; then
              echo "Stale PR cleanup REST hit a rate limit; using GraphQL fallback." >&2
              gh pr close "$pr_number" \
                --repo "$TARGET_OWNER/$TARGET_REPO" \
                --comment "${comment}" \
                --delete-branch
              echo "Stale PR cleanup API path: GraphQL fallback" >&2
              return 0
            fi

            cat "${rest_error}" >&2
            return 1
          }

          list_stale_prs | while read -r pr_number; do
            if [[ -n "$pr_number" ]]; then
              close_stale_pr "$pr_number" || true
            fi
          done

          git fetch origin main --prune
          git checkout main
          git reset --hard origin/main
          git push origin --delete contributors-please/update || true

          git rm -f CONTRIBUTORS.md .contributors.jsonl .contributors.yml || true
          seed_path="live-fixtures/${GITHUB_RUN_ID}-seed.md"
          {
            echo "# Live adoption seed"
            echo ""
            echo "run: ${GITHUB_RUN_ID}"
          } > "$seed_path"
          cat > .contributors.yml <<'YAML'
          entry_template: "{{login}} | {{title}} | {{commits}}"
          sort: alphabetical
          min_contributions: 1
          YAML
          today="$(date -u +%F)"
          existing_login="live-existing-${GITHUB_RUN_ID}"
          cat > .contributors.jsonl <<JSONL
          {"login":"${existing_login}","name":"Live Existing ${GITHUB_RUN_ID}","profile":"https://example.com/${existing_login}","avatar":"","source":"declared","pinned":true,"categories":["docs"],"title":"Existing Live","emoji":"docs","commits":0,"first_seen":"${today}","last_updated":"${today}"}
          JSONL

          git add .contributors.yml .contributors.jsonl "$seed_path"
          GIT_AUTHOR_NAME="$FIXTURE_NAME" \
          GIT_AUTHOR_EMAIL="$FIXTURE_EMAIL" \
          GIT_COMMITTER_NAME="$FIXTURE_NAME" \
          GIT_COMMITTER_EMAIL="$FIXTURE_EMAIL" \
            git commit -m "test: live adoption seed ${GITHUB_RUN_ID}"
          git push origin HEAD:main

      - name: Checkout action under test
        uses: actions/checkout@v6
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'main' }}
          path: ${{ env.ACTION_PATH }}
          persist-credentials: false

      - name: Exclude checked-out action from target git status
        run: |
          set -euo pipefail
          printf '%s\n' "${ACTION_PATH}/" >> .git/info/exclude
          git config --local --unset-all http.https://github.com/.extraheader || true

      - name: Run commit mode bootstrap
        id: commit-bootstrap
        env:
          TARGET_TOKEN: ${{ secrets.CONTRIBUTORS_PLEASE_E2E_TOKEN }}
          E2E_LOGIN: ${{ steps.target-actor.outputs.login }}
        run: |
          set -euo pipefail
          env \
            GITHUB_ACTIONS=true \
            GITHUB_REPOSITORY="${TARGET_OWNER}/${TARGET_REPO}" \
            GITHUB_SERVER_URL="${GITHUB_SERVER_URL}" \
            GITHUB_REF_NAME=main \
            "INPUT_PAT=${TARGET_TOKEN}" \
            "INPUT_MODE=commit" \
            "INPUT_BOOTSTRAP=true" \
            "INPUT_OUTPUT-FILE=CONTRIBUTORS.md" \
            "INPUT_STATE-FILE=.contributors.jsonl" \
            "INPUT_CONFIG-FILE=.contributors.yml" \
            "INPUT_UNIGNORE=${E2E_LOGIN}" \
            "INPUT_COMMIT-MESSAGE=docs: update contributors" \
            node "${ACTION_PATH}/dist/index.js"

      - name: Verify commit mode persisted files
        env:
          CHANGED: ${{ steps.commit-bootstrap.outputs.changed }}
          COMMIT_SHA: ${{ steps.commit-bootstrap.outputs.commit-sha }}
          CONTRIBUTORS_JSON: ${{ steps.commit-bootstrap.outputs.contributors-json }}
        run: |
          set -euo pipefail
          existing_login="live-existing-${GITHUB_RUN_ID}"
          test "$CHANGED" = "true"
          test -n "$COMMIT_SHA"
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          test -s CONTRIBUTORS.md
          test -s .contributors.jsonl
          grep -F "$existing_login | Existing Live | 0" CONTRIBUTORS.md
          grep -F "\"login\":\"$existing_login\"" .contributors.jsonl
          node -e 'const contributors=JSON.parse(process.env.CONTRIBUTORS_JSON); const expected="live-existing-" + process.env.GITHUB_RUN_ID; if (!contributors.some(c => c.login === expected)) process.exit(1);'
          shasum -a 256 CONTRIBUTORS.md .contributors.jsonl > test-output/live-adoption/commit-bootstrap.sha256
          {
            echo "commit-bootstrap.changed=$CHANGED"
            echo "commit-bootstrap.commit-sha=$COMMIT_SHA"
          } > test-output/live-adoption/commit-bootstrap.outputs

      - name: Add declared contributor state
        env:
          FIXTURE_NAME: ${{ steps.target-actor.outputs.fixture-name }}
          FIXTURE_EMAIL: ${{ steps.target-actor.outputs.fixture-email }}
        run: |
          set -euo pipefail
          today="$(date -u +%F)"
          declared_login="live-declared-${GITHUB_RUN_ID}"
          cat >> .contributors.jsonl <<JSONL
          {"login":"${declared_login}","name":"Live Declared ${GITHUB_RUN_ID}","profile":"https://example.com/${declared_login}","avatar":"","source":"declared","pinned":true,"categories":["docs"],"title":"Live Declared","emoji":"docs","commits":0,"first_seen":"${today}","last_updated":"${today}"}
          JSONL
          git add .contributors.jsonl
          GIT_AUTHOR_NAME="$FIXTURE_NAME" \
          GIT_AUTHOR_EMAIL="$FIXTURE_EMAIL" \
          GIT_COMMITTER_NAME="$FIXTURE_NAME" \
          GIT_COMMITTER_EMAIL="$FIXTURE_EMAIL" \
            git commit -m "test: add declared contributor ${GITHUB_RUN_ID}"
          git push origin HEAD:main

      - name: Run commit mode after incremental state change
        id: commit-incremental
        env:
          TARGET_TOKEN: ${{ secrets.CONTRIBUTORS_PLEASE_E2E_TOKEN }}
          E2E_LOGIN: ${{ steps.target-actor.outputs.login }}
        run: |
          set -euo pipefail
          env \
            GITHUB_ACTIONS=true \
            GITHUB_REPOSITORY="${TARGET_OWNER}/${TARGET_REPO}" \
            GITHUB_SERVER_URL="${GITHUB_SERVER_URL}" \
            GITHUB_REF_NAME=main \
            "INPUT_PAT=${TARGET_TOKEN}" \
            "INPUT_MODE=commit" \
            "INPUT_BOOTSTRAP=true" \
            "INPUT_OUTPUT-FILE=CONTRIBUTORS.md" \
            "INPUT_STATE-FILE=.contributors.jsonl" \
            "INPUT_CONFIG-FILE=.contributors.yml" \
            "INPUT_UNIGNORE=${E2E_LOGIN}" \
            "INPUT_COMMIT-MESSAGE=docs: update contributors" \
            node "${ACTION_PATH}/dist/index.js"

      - name: Verify incremental state rendered and preserved
        env:
          CHANGED: ${{ steps.commit-incremental.outputs.changed }}
          COMMIT_SHA: ${{ steps.commit-incremental.outputs.commit-sha }}
        run: |
          set -euo pipefail
          existing_login="live-existing-${GITHUB_RUN_ID}"
          declared_login="live-declared-${GITHUB_RUN_ID}"
          test "$CHANGED" = "true"
          test -n "$COMMIT_SHA"
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          grep -F "$existing_login | Existing Live | 0" CONTRIBUTORS.md
          grep -F "$declared_login | Live Declared | 0" CONTRIBUTORS.md
          grep -F "\"login\":\"$declared_login\"" .contributors.jsonl
          grep -F '"source":"declared"' .contributors.jsonl
          grep -F '"pinned":true' .contributors.jsonl
          shasum -a 256 CONTRIBUTORS.md .contributors.jsonl > test-output/live-adoption/incremental.sha256
          {
            echo "commit-incremental.changed=$CHANGED"
            echo "commit-incremental.commit-sha=$COMMIT_SHA"
          } > test-output/live-adoption/commit-incremental.outputs

      - name: Run idempotent commit mode
        id: commit-idempotent
        env:
          TARGET_TOKEN: ${{ secrets.CONTRIBUTORS_PLEASE_E2E_TOKEN }}
          E2E_LOGIN: ${{ steps.target-actor.outputs.login }}
        run: |
          set -euo pipefail
          env \
            GITHUB_ACTIONS=true \
            GITHUB_REPOSITORY="${TARGET_OWNER}/${TARGET_REPO}" \
            GITHUB_SERVER_URL="${GITHUB_SERVER_URL}" \
            GITHUB_REF_NAME=main \
            "INPUT_PAT=${TARGET_TOKEN}" \
            "INPUT_MODE=commit" \
            "INPUT_BOOTSTRAP=true" \
            "INPUT_OUTPUT-FILE=CONTRIBUTORS.md" \
            "INPUT_STATE-FILE=.contributors.jsonl" \
            "INPUT_CONFIG-FILE=.contributors.yml" \
            "INPUT_UNIGNORE=${E2E_LOGIN}" \
            node "${ACTION_PATH}/dist/index.js"

      - name: Verify idempotent run made no file changes
        env:
          CHANGED: ${{ steps.commit-idempotent.outputs.changed }}
          COMMIT_SHA: ${{ steps.commit-idempotent.outputs.commit-sha }}
        run: |
          set -euo pipefail
          test "$CHANGED" = "false"
          shasum -a 256 CONTRIBUTORS.md .contributors.jsonl > test-output/live-adoption/idempotent.sha256
          cmp test-output/live-adoption/incremental.sha256 test-output/live-adoption/idempotent.sha256
          {
            echo "commit-idempotent.changed=$CHANGED"
            echo "commit-idempotent.commit-sha=$COMMIT_SHA"
          } > test-output/live-adoption/commit-idempotent.outputs

      - name: Prepare pull request mode fixture
        env:
          GH_TOKEN: ${{ secrets.CONTRIBUTORS_PLEASE_E2E_TOKEN }}
          FIXTURE_NAME: ${{ steps.target-actor.outputs.fixture-name }}
          FIXTURE_EMAIL: ${{ steps.target-actor.outputs.fixture-email }}
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          git push origin --delete contributors-please/update || true
          git rm -f CONTRIBUTORS.md .contributors.jsonl
          today="$(date -u +%F)"
          pr_login="live-pr-${GITHUB_RUN_ID}"
          cat > .contributors.jsonl <<JSONL
          {"login":"${pr_login}","name":"Live PR ${GITHUB_RUN_ID}","profile":"https://example.com/${pr_login}","avatar":"","source":"declared","pinned":true,"categories":["docs"],"title":"Pull Request Live","emoji":"docs","commits":0,"last_updated":"${today}"}
          JSONL
          pr_path="live-fixtures/${GITHUB_RUN_ID}-pr.md"
          {
            echo "# Live adoption PR"
            echo ""
            echo "run: ${GITHUB_RUN_ID}"
          } > "$pr_path"
          git add .contributors.jsonl "$pr_path"
          GIT_AUTHOR_NAME="$FIXTURE_NAME" \
          GIT_AUTHOR_EMAIL="$FIXTURE_EMAIL" \
          GIT_COMMITTER_NAME="$FIXTURE_NAME" \
          GIT_COMMITTER_EMAIL="$FIXTURE_EMAIL" \
            git commit -m "test: live adoption pr fixture ${GITHUB_RUN_ID}"
          git push origin HEAD:main

      - name: Run pull-request mode
        id: pull-request
        env:
          TARGET_TOKEN: ${{ secrets.CONTRIBUTORS_PLEASE_E2E_TOKEN }}
          E2E_LOGIN: ${{ steps.target-actor.outputs.login }}
        run: |
          set -euo pipefail
          env \
            GITHUB_ACTIONS=true \
            GITHUB_REPOSITORY="${TARGET_OWNER}/${TARGET_REPO}" \
            GITHUB_SERVER_URL="${GITHUB_SERVER_URL}" \
            GITHUB_REF_NAME=main \
            "INPUT_PAT=${TARGET_TOKEN}" \
            "INPUT_MODE=pull-request" \
            "INPUT_BOOTSTRAP=true" \
            "INPUT_OUTPUT-FILE=CONTRIBUTORS.md" \
            "INPUT_STATE-FILE=.contributors.jsonl" \
            "INPUT_CONFIG-FILE=.contributors.yml" \
            "INPUT_UNIGNORE=${E2E_LOGIN}" \
            node "${ACTION_PATH}/dist/index.js"

      - name: Verify pull request mode side effects
        env:
          GH_TOKEN: ${{ secrets.CONTRIBUTORS_PLEASE_E2E_TOKEN }}
          PR_OPENED: ${{ steps.pull-request.outputs.pr-opened }}
          PR_NUMBER: ${{ steps.pull-request.outputs.pr-number }}
          PR_URL: ${{ steps.pull-request.outputs.pr-url }}
        run: |
          set -euo pipefail
          test "$PR_OPENED" = "true"
          test -n "$PR_NUMBER"
          test -n "$PR_URL"
          is_rate_limit_error() {
            grep -qiE 'rate limit|secondary rate|abuse detection' "$1"
          }

          write_pr_snapshot_with_rest() {
            local rest_error="test-output/live-adoption/pull-request-rest.err"
            if gh api --method GET "repos/${TARGET_OWNER}/${TARGET_REPO}/pulls/${PR_NUMBER}" \
              > test-output/live-adoption/pull-request-core.json 2>"${rest_error}" &&
              gh api --method GET "repos/${TARGET_OWNER}/${TARGET_REPO}/issues/${PR_NUMBER}" \
                > test-output/live-adoption/pull-request-issue.json 2>>"${rest_error}" &&
              gh api --method GET "repos/${TARGET_OWNER}/${TARGET_REPO}/pulls/${PR_NUMBER}/files" \
                -f per_page=100 \
                > test-output/live-adoption/pull-request-files.json 2>>"${rest_error}"; then
              node <<'NODE'
          const fs = require("node:fs");
          const core = JSON.parse(fs.readFileSync("test-output/live-adoption/pull-request-core.json", "utf8"));
          const issue = JSON.parse(fs.readFileSync("test-output/live-adoption/pull-request-issue.json", "utf8"));
          const fileList = JSON.parse(fs.readFileSync("test-output/live-adoption/pull-request-files.json", "utf8"));
          const pr = {
            files: fileList.map(file => ({ path: file.filename })),
            headRefName: core.head.ref,
            labels: issue.labels.map(label => ({ name: label.name })),
            state: core.state,
            title: core.title,
            url: core.html_url,
          };
          fs.writeFileSync(
            "test-output/live-adoption/pull-request.json",
            `${JSON.stringify(pr, null, 2)}\n`,
          );
          NODE
              echo "Pull request verification API path: REST"
              return 0
            fi

            if is_rate_limit_error "${rest_error}"; then
              return 2
            fi

            cat "${rest_error}" >&2
            return 1
          }

          set +e
          write_pr_snapshot_with_rest
          snapshot_status=$?
          set -e

          if [[ "${snapshot_status}" -eq 2 ]]; then
            echo "Pull request verification REST hit a rate limit; using GraphQL fallback." >&2
            gh pr view "$PR_NUMBER" \
              --repo "$TARGET_OWNER/$TARGET_REPO" \
              --json labels,files,headRefName,state,title,url \
              > test-output/live-adoption/pull-request.json
            echo "Pull request verification API path: GraphQL fallback"
          elif [[ "${snapshot_status}" -ne 0 ]]; then
            exit "${snapshot_status}"
          fi

          node <<'NODE'
          const fs = require("node:fs");
          const pr = JSON.parse(fs.readFileSync("test-output/live-adoption/pull-request.json", "utf8"));
          const labels = new Set(pr.labels.map(label => label.name));
          const files = new Set(pr.files.map(file => file.path));
          if (pr.headRefName !== "contributors-please/update") {
            throw new Error(`unexpected head ref ${pr.headRefName}`);
          }
          if (!labels.has("contributors-please: pending")) {
            throw new Error("missing pending label");
          }
          for (const path of [".contributors.jsonl", "CONTRIBUTORS.md"]) {
            if (!files.has(path)) {
              throw new Error(`missing PR file ${path}`);
            }
          }
          NODE
          {
            echo "pull-request.pr-opened=$PR_OPENED"
            echo "pull-request.pr-number=$PR_NUMBER"
            echo "pull-request.pr-url=$PR_URL"
          } > test-output/live-adoption/pull-request.outputs

      - name: Summarize live adoption evidence
        if: ${{ always() }}
        run: |
          {
            echo "### contributors-please live adoption"
            echo ""
            echo "- target: ${TARGET_OWNER}/${TARGET_REPO}"
            echo "- action ref: ${{ inputs.action_ref || 'main' }}"
            echo "- commit bootstrap changed: ${{ steps.commit-bootstrap.outputs.changed }}"
            echo "- incremental changed: ${{ steps.commit-incremental.outputs.changed }}"
            echo "- idempotent changed: ${{ steps.commit-idempotent.outputs.changed }}"
            echo "- pull request opened: ${{ steps.pull-request.outputs.pr-opened }}"
            echo "- pull request number: ${{ steps.pull-request.outputs.pr-number }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload live adoption evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: live-adoption-evidence
          path: test-output/live-adoption
          include-hidden-files: true
