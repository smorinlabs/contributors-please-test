name: contributors-please auth and discovery

run-name: ${{ github.workflow }} ${{ inputs.test_id || 'all' }} suite ${{ inputs.suite_run_id || github.run_id }} action ${{ inputs.action_ref || 'v1' }}

on:
  workflow_dispatch:
    inputs:
      action_ref:
        description: contributors-please-action ref to test.
        required: false
        default: v1
      suite_run_id:
        description: Optional downstream suite run ID for orchestrator correlation.
        required: false
        default: manual
      test_id:
        description: CP-GHA auth/discovery test ID to run, or all.
        required: false
        default: all
        type: choice
        options:
          - all
          - CP-GHA-001
          - CP-GHA-002
          - CP-GHA-003
          - CP-GHA-004
          - CP-GHA-005
          - CP-GHA-006

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: contributors-please-test-${{ github.ref }}
  cancel-in-progress: false

env:
  ACTION_PATH: .github/actions/contributors-please-action

jobs:
  cp-gha-001:
    name: CP-GHA-001 app-token acquisition and identity
    if: ${{ inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-001' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare fake App fixture
        run: |
          set -euo pipefail
          git pull --ff-only origin "$GITHUB_REF_NAME"
          out_dir="test-output/CP-GHA-001"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          openssl genrsa 2048 > "$out_dir/app-private-key.pem"
          cat > "$out_dir/.contributors.jsonl" <<'JSONL'
          {"login":"app-token-tester","name":"App Token Tester","profile":"https://example.com/app-token-tester","avatar":"","source":"declared","pinned":true,"categories":["ops"],"title":"App Token Tester","emoji":"app","commits":0,"first_seen":"2026-05-28","last_updated":"2026-05-28"}
          JSONL
          nohup node scripts/fake-github-api.mjs 18001 "$out_dir" contributors-please-test-app 26001 > "$out_dir/server.log" 2>&1 &
          echo "$!" > "$out_dir/server.pid"
          for _ in {1..20}; do
            if curl -fsS http://127.0.0.1:18001/__ready >/dev/null; then
              break
            fi
            sleep 0.25
          done
          curl -fsS http://127.0.0.1:18001/__ready >/dev/null
          echo "CP_GHA_001_API=http://127.0.0.1:18001" >> "$GITHUB_ENV"
      - name: Run contributors-please with App and PAT inputs
        id: contributors
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_REF_NAME="$GITHUB_REF_NAME" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_APP-ID=12345' \
            "INPUT_PRIVATE-KEY=$(cat test-output/CP-GHA-001/app-private-key.pem)" \
            'INPUT_PAT=fake-pat-must-not-win' \
            "INPUT_GITHUB-API-URL=${CP_GHA_001_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-001/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-001/.contributors.jsonl' \
            'INPUT_MODE=commit' \
            'INPUT_ENTRY-TEMPLATE={{login}} {{title}}' \
            'INPUT_MIN-CONTRIBUTIONS=999999' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Verify App token path
        run: |
          set -euo pipefail
          test "${{ steps.contributors.outputs.token-source }}" = "app"
          test "${{ steps.contributors.outputs.committer-login }}" = "contributors-please-test-app[bot]"
          grep -F "GET /repos/" test-output/CP-GHA-001/api.log
          grep -F "/installation" test-output/CP-GHA-001/api.log
          grep -F "/app/installations/26001/access_tokens" test-output/CP-GHA-001/api.log
          grep -F "app-token-tester App Token Tester" test-output/CP-GHA-001/contributors.md
          {
            echo "### CP-GHA-001"
            echo ""
            echo "- output: test-output/CP-GHA-001/contributors.md"
            echo "- token-source: ${{ steps.contributors.outputs.token-source }}"
            echo "- committer-login: ${{ steps.contributors.outputs.committer-login }}"
            echo "- fake-api-log: test-output/CP-GHA-001/api.log"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: cp-gha-001
          path: test-output/CP-GHA-001
          include-hidden-files: true

  cp-gha-002:
    name: CP-GHA-002 PAT acquisition and identity
    needs: cp-gha-001
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-002') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare fake PAT fixture
        run: |
          set -euo pipefail
          git pull --ff-only origin "$GITHUB_REF_NAME"
          out_dir="test-output/CP-GHA-002"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          cat > "$out_dir/.contributors.jsonl" <<'JSONL'
          {"login":"pat-token-tester","name":"PAT Token Tester","profile":"https://example.com/pat-token-tester","avatar":"","source":"declared","pinned":true,"categories":["ops"],"title":"PAT Token Tester","emoji":"pat","commits":0,"first_seen":"2026-05-28","last_updated":"2026-05-28"}
          JSONL
          nohup node scripts/fake-github-api.mjs 18002 "$out_dir" pat-token-user 26002 > "$out_dir/server.log" 2>&1 &
          echo "$!" > "$out_dir/server.pid"
          for _ in {1..20}; do
            if curl -fsS http://127.0.0.1:18002/__ready >/dev/null; then
              break
            fi
            sleep 0.25
          done
          curl -fsS http://127.0.0.1:18002/__ready >/dev/null
          echo "CP_GHA_002_API=http://127.0.0.1:18002" >> "$GITHUB_ENV"
      - name: Run contributors-please with PAT
        id: contributors
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_REF_NAME="$GITHUB_REF_NAME" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-pat-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_002_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-002/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-002/.contributors.jsonl' \
            'INPUT_MODE=commit' \
            'INPUT_ENTRY-TEMPLATE={{login}} {{title}}' \
            'INPUT_MIN-CONTRIBUTIONS=999999' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Verify PAT path
        run: |
          set -euo pipefail
          test "${{ steps.contributors.outputs.token-source }}" = "pat"
          test "${{ steps.contributors.outputs.committer-login }}" = "pat-token-user"
          grep -F "GET /user" test-output/CP-GHA-002/api.log
          grep -F "pat-token-tester PAT Token Tester" test-output/CP-GHA-002/contributors.md
          {
            echo "### CP-GHA-002"
            echo ""
            echo "- output: test-output/CP-GHA-002/contributors.md"
            echo "- token-source: ${{ steps.contributors.outputs.token-source }}"
            echo "- committer-login: ${{ steps.contributors.outputs.committer-login }}"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: cp-gha-002
          path: test-output/CP-GHA-002
          include-hidden-files: true

  cp-gha-003:
    name: CP-GHA-003 expected-failure-missing-credentials
    needs: cp-gha-002
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-003') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare missing-credentials fixture
        run: |
          set -euo pipefail
          git pull --ff-only origin "$GITHUB_REF_NAME"
          out_dir="test-output/CP-GHA-003"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          cat > "$out_dir/control.jsonl" <<'JSONL'
          {"login":"missing-credentials-control","name":"Missing Credentials Control","profile":"https://example.com/missing-credentials-control","avatar":"","source":"declared","pinned":true,"categories":["ops"],"title":"Missing Credentials Control","emoji":"ctrl","commits":0,"first_seen":"2026-05-28","last_updated":"2026-05-28"}
          JSONL
          cp "$out_dir/control.jsonl" "$out_dir/.contributors.jsonl"
          nohup node scripts/fake-github-api.mjs 18003 "$out_dir" missing-credentials-control 26003 > "$out_dir/server.log" 2>&1 &
          echo "$!" > "$out_dir/server.pid"
          for _ in {1..20}; do
            if curl -fsS http://127.0.0.1:18003/__ready >/dev/null; then
              break
            fi
            sleep 0.25
          done
          curl -fsS http://127.0.0.1:18003/__ready >/dev/null
          echo "CP_GHA_003_API=http://127.0.0.1:18003" >> "$GITHUB_ENV"
      - name: Run valid control
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_REF_NAME="$GITHUB_REF_NAME" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-control-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_003_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-003/control-contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-003/.contributors.jsonl' \
            'INPUT_MODE=commit' \
            'INPUT_ENTRY-TEMPLATE={{login}} {{title}}' \
            'INPUT_MIN-CONTRIBUTIONS=999999' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: "EXPECTED FAILURE: missing credentials"
        run: |
          set +e
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_REF_NAME="$GITHUB_REF_NAME" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            "INPUT_GITHUB-API-URL=${CP_GHA_003_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-003/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-003/failed-state.jsonl' \
            'INPUT_MODE=commit' \
            node .github/actions/contributors-please-action/dist/index.js \
              > test-output/CP-GHA-003/expected-failure.raw.log 2>&1
          status=$?
          set -e
          cat test-output/CP-GHA-003/expected-failure.raw.log
          test "$status" != "0"
          grep -F "Provide either app-id + private-key, or pat." test-output/CP-GHA-003/expected-failure.raw.log
          test ! -f test-output/CP-GHA-003/contributors.md
          test ! -f test-output/CP-GHA-003/failed-state.jsonl
          {
            echo "expected_failure: true"
            echo "expected_error: Provide either app-id + private-key, or pat."
            echo "observed_status: $status"
            echo "control_output: test-output/CP-GHA-003/control-contributors.md"
            echo "raw_log: test-output/CP-GHA-003/expected-failure.raw.log"
          } > test-output/CP-GHA-003/expected-failure.log
          cat test-output/CP-GHA-003/expected-failure.log >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: cp-gha-003
          path: test-output/CP-GHA-003
          include-hidden-files: true

  cp-gha-004:
    name: CP-GHA-004 contributor discovery smoke
    needs: cp-gha-003
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-004') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare isolated discovery repository
        run: |
          set -euo pipefail
          out_dir="$GITHUB_WORKSPACE/test-output/CP-GHA-004"
          repo="$out_dir/repo"
          rm -rf "$out_dir"
          mkdir -p "$repo"
          git init "$repo"
          git -C "$repo" config user.name "Fixture Committer"
          git -C "$repo" config user.email "fixture@example.com"
          echo "one" > "$repo/docs.md"
          git -C "$repo" add docs.md
          GIT_AUTHOR_NAME="Discovery Tester" \
            GIT_AUTHOR_EMAIL="26004+discovery-tester@users.noreply.github.com" \
            GIT_AUTHOR_DATE="2026-05-27T12:00:00Z" \
            GIT_COMMITTER_DATE="2026-05-27T12:00:00Z" \
            git -C "$repo" commit -m "docs: seed discovery"
          echo "two" >> "$repo/docs.md"
          git -C "$repo" add docs.md
          GIT_AUTHOR_NAME="Discovery Tester" \
            GIT_AUTHOR_EMAIL="26004+discovery-tester@users.noreply.github.com" \
            GIT_AUTHOR_DATE="2026-05-28T12:00:00Z" \
            GIT_COMMITTER_DATE="2026-05-28T12:00:00Z" \
            git -C "$repo" commit -m "docs: update discovery"
          git -C "$repo" log --no-merges --name-only --pretty='format:%H %an <%ae>' > "$out_dir/git-log-evidence.txt"
          cat > "$out_dir/api-contributors.json" <<'JSON'
          [{"login":"discovery-tester","avatar_url":"","html_url":"https://github.com/discovery-tester","contributions":2}]
          JSON
          nohup node scripts/fake-github-api.mjs 18004 "$out_dir" discovery-pat-user 26004 > "$out_dir/server.log" 2>&1 &
          echo "$!" > "$out_dir/server.pid"
          for _ in {1..20}; do
            if curl -fsS http://127.0.0.1:18004/__ready >/dev/null; then
              break
            fi
            sleep 0.25
          done
          curl -fsS http://127.0.0.1:18004/__ready >/dev/null
          echo "CP_GHA_004_API=http://127.0.0.1:18004" >> "$GITHUB_ENV"
      - name: Run contributors-please discovery
        id: contributors
        run: |
          action_dist="$GITHUB_WORKSPACE/.github/actions/contributors-please-action/dist/index.js"
          cd test-output/CP-GHA-004/repo
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_REF_NAME="$GITHUB_REF_NAME" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-discovery-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_004_API}" \
            'INPUT_OUTPUT-FILE=contributors.md' \
            'INPUT_STATE-FILE=.contributors.jsonl' \
            'INPUT_MODE=commit' \
            'INPUT_BOOTSTRAP=true' \
            'INPUT_ENTRY-TEMPLATE={{login}} {{title}}' \
            node "$action_dist"
          cp contributors.md ../contributors.md
          cp .contributors.jsonl ../.contributors.jsonl
      - name: Verify discovery smoke
        run: |
          set -euo pipefail
          test -s test-output/CP-GHA-004/git-log-evidence.txt
          test -s test-output/CP-GHA-004/.contributors.jsonl
          grep -F "discovery-tester" test-output/CP-GHA-004/contributors.md
          grep -F '"commits":2' test-output/CP-GHA-004/.contributors.jsonl
          test -n '${{ steps.contributors.outputs.contributors-json }}'
          {
            echo "### CP-GHA-004"
            echo ""
            echo "- output: test-output/CP-GHA-004/contributors.md"
            echo "- git-log-evidence: test-output/CP-GHA-004/git-log-evidence.txt"
            echo "- changed: ${{ steps.contributors.outputs.changed }}"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: cp-gha-004
          path: test-output/CP-GHA-004
          include-hidden-files: true

  cp-gha-005:
    name: CP-GHA-005 expected-failure-shallow-checkout
    needs: cp-gha-004
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-005') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare shallow-checkout fixture
        run: |
          set -euo pipefail
          out_dir="$GITHUB_WORKSPACE/test-output/CP-GHA-005"
          source_repo="$out_dir/source"
          shallow_repo="$out_dir/shallow"
          rm -rf "$out_dir"
          mkdir -p "$source_repo"
          git init "$source_repo"
          git -C "$source_repo" config user.name "Fixture Committer"
          git -C "$source_repo" config user.email "fixture@example.com"
          echo "one" > "$source_repo/file.txt"
          git -C "$source_repo" add file.txt
          git -C "$source_repo" commit -m "test: one"
          echo "two" >> "$source_repo/file.txt"
          git -C "$source_repo" add file.txt
          git -C "$source_repo" commit -m "test: two"
          cat > "$source_repo/.contributors.jsonl" <<'JSONL'
          {"login":"shallow-control","name":"Shallow Control","profile":"https://example.com/shallow-control","avatar":"","source":"declared","pinned":true,"categories":["ops"],"title":"Shallow Control","emoji":"ctrl","commits":0,"first_seen":"2026-05-28","last_updated":"2026-05-28"}
          JSONL
          git clone --depth=1 "file://$source_repo" "$shallow_repo"
          test "$(git -C "$shallow_repo" rev-parse --is-shallow-repository)" = "true"
          nohup node scripts/fake-github-api.mjs 18005 "$out_dir" shallow-pat-user 26005 > "$out_dir/server.log" 2>&1 &
          echo "$!" > "$out_dir/server.pid"
          for _ in {1..20}; do
            if curl -fsS http://127.0.0.1:18005/__ready >/dev/null; then
              break
            fi
            sleep 0.25
          done
          curl -fsS http://127.0.0.1:18005/__ready >/dev/null
          echo "CP_GHA_005_API=http://127.0.0.1:18005" >> "$GITHUB_ENV"
      - name: Run valid full-depth control
        run: |
          action_dist="$GITHUB_WORKSPACE/.github/actions/contributors-please-action/dist/index.js"
          cd test-output/CP-GHA-005/source
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_REF_NAME="$GITHUB_REF_NAME" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-control-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_005_API}" \
            'INPUT_OUTPUT-FILE=control-contributors.md' \
            'INPUT_STATE-FILE=.contributors.jsonl' \
            'INPUT_MODE=commit' \
            'INPUT_ENTRY-TEMPLATE={{login}} {{title}}' \
            'INPUT_MIN-CONTRIBUTIONS=999999' \
            node "$action_dist"
          cp control-contributors.md ../control-contributors.md
      - name: "EXPECTED FAILURE: shallow checkout"
        run: |
          set +e
          action_dist="$GITHUB_WORKSPACE/.github/actions/contributors-please-action/dist/index.js"
          cd test-output/CP-GHA-005/shallow
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_REF_NAME="$GITHUB_REF_NAME" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-shallow-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_005_API}" \
            'INPUT_OUTPUT-FILE=contributors.md' \
            'INPUT_STATE-FILE=.contributors.jsonl' \
            'INPUT_MODE=commit' \
            'INPUT_BOOTSTRAP=true' \
            node "$action_dist" > ../expected-failure.raw.log 2>&1
          status=$?
          set -e
          cd "$GITHUB_WORKSPACE"
          cat test-output/CP-GHA-005/expected-failure.raw.log
          test "$status" != "0"
          grep -F "fetch-depth: 0" test-output/CP-GHA-005/expected-failure.raw.log
          test ! -f test-output/CP-GHA-005/contributors.md
          {
            echo "expected_failure: true"
            echo "expected_error: fetch-depth: 0"
            echo "observed_status: $status"
            echo "control_output: test-output/CP-GHA-005/control-contributors.md"
            echo "raw_log: test-output/CP-GHA-005/expected-failure.raw.log"
          } > test-output/CP-GHA-005/expected-failure.log
          cat test-output/CP-GHA-005/expected-failure.log >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: cp-gha-005
          path: test-output/CP-GHA-005
          include-hidden-files: true

  cp-gha-006:
    name: CP-GHA-006 self-exclusion notice
    needs: cp-gha-005
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-006') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare self-exclusion fixture
        run: |
          set -euo pipefail
          git pull --ff-only origin "$GITHUB_REF_NAME"
          out_dir="test-output/CP-GHA-006"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          cat > "$out_dir/filtered.jsonl" <<'JSONL'
          {"login":"self-exclusion-control","name":"Self Exclusion Control","profile":"https://example.com/self-exclusion-control","avatar":"","source":"declared","pinned":true,"categories":["ops"],"title":"Self Exclusion Control","emoji":"ctrl","commits":0,"first_seen":"2026-05-28","last_updated":"2026-05-28"}
          {"login":"self-exclusion-bot","name":"Self Exclusion Bot","profile":"https://example.com/self-exclusion-bot","avatar":"","source":"declared","pinned":true,"categories":["ops"],"title":"Self Exclusion Bot","emoji":"bot","commits":0,"first_seen":"2026-05-28","last_updated":"2026-05-28"}
          JSONL
          cp "$out_dir/filtered.jsonl" "$out_dir/unignore.jsonl"
          nohup node scripts/fake-github-api.mjs 18006 "$out_dir" self-exclusion-bot 26006 > "$out_dir/server.log" 2>&1 &
          echo "$!" > "$out_dir/server.pid"
          for _ in {1..20}; do
            if curl -fsS http://127.0.0.1:18006/__ready >/dev/null; then
              break
            fi
            sleep 0.25
          done
          curl -fsS http://127.0.0.1:18006/__ready >/dev/null
          echo "CP_GHA_006_API=http://127.0.0.1:18006" >> "$GITHUB_ENV"
      - name: Run contributors-please with self-exclusion
        id: contributors
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_STEP_SUMMARY=test-output/CP-GHA-006/action-summary.md \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_REF_NAME="$GITHUB_REF_NAME" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-self-exclusion-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_006_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-006/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-006/filtered.jsonl' \
            'INPUT_MODE=commit' \
            'INPUT_ENTRY-TEMPLATE={{login}} {{title}}' \
            'INPUT_MIN-CONTRIBUTIONS=999999' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Run contributors-please with unignore
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_STEP_SUMMARY=test-output/CP-GHA-006/action-summary.md \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_REF_NAME="$GITHUB_REF_NAME" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-self-exclusion-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_006_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-006/unignore-contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-006/unignore.jsonl' \
            'INPUT_MODE=commit' \
            'INPUT_ENTRY-TEMPLATE={{login}} {{title}}' \
            'INPUT_MIN-CONTRIBUTIONS=999999' \
            'INPUT_UNIGNORE=self-exclusion-bot' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Verify self-exclusion summary
        run: |
          set -euo pipefail
          test "${{ steps.contributors.outputs.committer-login }}" = "self-exclusion-bot"
          grep -F "Self-excluded committer" test-output/CP-GHA-006/action-summary.md
          grep -F "self-exclusion-control Self Exclusion Control" test-output/CP-GHA-006/contributors.md
          if grep -F "self-exclusion-bot Self Exclusion Bot" test-output/CP-GHA-006/contributors.md; then
            echo "self-exclusion-bot rendered without unignore" >&2
            exit 1
          fi
          grep -F "self-exclusion-bot Self Exclusion Bot" test-output/CP-GHA-006/unignore-contributors.md
          cp test-output/CP-GHA-006/filtered.jsonl test-output/CP-GHA-006/.contributors.jsonl
          cat test-output/CP-GHA-006/action-summary.md >> "$GITHUB_STEP_SUMMARY"
          {
            echo "### CP-GHA-006"
            echo ""
            echo "- output: test-output/CP-GHA-006/contributors.md"
            echo "- unignore-output: test-output/CP-GHA-006/unignore-contributors.md"
            echo "- committer-login: ${{ steps.contributors.outputs.committer-login }}"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: cp-gha-006
          path: test-output/CP-GHA-006
          include-hidden-files: true
