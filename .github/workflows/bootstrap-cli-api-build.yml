name: contributors-please bootstrap cli api build

run-name: ${{ github.workflow }} ${{ inputs.test_id || 'all' }} suite ${{ inputs.suite_run_id || github.run_id }} action ${{ inputs.action_ref || 'v1' }}

on:
  workflow_dispatch:
    inputs:
      action_ref:
        description: contributors-please-action ref to test.
        required: false
        default: v1
      library_ref:
        description: contributors-please library ref to test.
        required: false
        default: main
      suite_run_id:
        description: Optional downstream suite run ID for orchestrator correlation.
        required: false
        default: manual
      test_id:
        description: CP-GHA bootstrap/CLI/API/build test ID to run, or all.
        required: false
        default: all
        type: choice
        options:
          - all
          - CP-GHA-033
          - CP-GHA-034
          - CP-GHA-035
          - CP-GHA-036
          - CP-GHA-037
          - CP-GHA-038
          - CP-GHA-044
          - CP-GHA-047

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: contributors-please-test-${{ github.ref }}
  cancel-in-progress: false

env:
  ACTION_PATH: .github/actions/contributors-please-action

jobs:
  cp-gha-033:
    name: CP-GHA-033 CLI bootstrap before Action adoption
    if: ${{ inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-033' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/checkout@v6
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Prepare CLI bootstrap fixture
        run: |
          set -euo pipefail
          out_dir="$GITHUB_WORKSPACE/test-output/CP-GHA-033"
          repo="$out_dir/repo"
          rm -rf "$out_dir"
          mkdir -p "$repo"
          git init "$repo"
          git -C "$repo" config user.name "Fixture Committer"
          git -C "$repo" config user.email "fixture@example.com"
          cat > "$repo/.contributors.yml" <<'YAML'
          output_file: contributors.md
          state_file: .contributors.jsonl
          entry_template: "{{login}} {{title}}"
          no_reply_domain: users.noreply.github.com
          YAML
          echo "bootstrap" > "$repo/bootstrap.md"
          git -C "$repo" add .contributors.yml bootstrap.md
          GIT_AUTHOR_NAME="CLI Bootstrap" \
            GIT_AUTHOR_EMAIL="26033+cli-bootstrap@users.noreply.github.com" \
            GIT_AUTHOR_DATE="2026-05-28T12:00:00Z" \
            GIT_COMMITTER_DATE="2026-05-28T12:00:00Z" \
            git -C "$repo" commit -m "docs: seed cli bootstrap"
          cat > "$out_dir/api-contributors.json" <<'JSON'
          [{"login":"cli-bootstrap","avatar_url":"","html_url":"https://github.com/cli-bootstrap","contributions":1}]
          JSON
          bash scripts/start-fake-api.sh 18033 "$out_dir" cli-bootstrap-token 26033 CP_GHA_033_SERVER /__ready
      - name: Bootstrap with published CLI
        run: |
          set -euo pipefail
          cd test-output/CP-GHA-033/repo
          npm_config_yes=true npx contributors-please@latest init --non-interactive \
            --owner smorinlabs \
            --repo contributors-please-test \
            --token fake-cli-token \
            --github-server-url "$CP_GHA_033_SERVER" \
            --config-file .contributors.yml
          cp contributors.md ../cli-contributors.md
          cp .contributors.jsonl ../cli-state.jsonl
      - name: Run Action incrementally
        id: action
        run: |
          action_dist="$GITHUB_WORKSPACE/.github/actions/contributors-please-action/dist/index.js"
          cd test-output/CP-GHA-033/repo
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_REF_NAME="$GITHUB_REF_NAME" \
            GITHUB_SERVER_URL="$CP_GHA_033_SERVER" \
            'INPUT_PAT=fake-action-token' \
            'INPUT_MODE=commit' \
            node "$action_dist"
          cp contributors.md ../contributors.md
          cp .contributors.jsonl ../.contributors.jsonl
      - name: Verify CLI bootstrap parity
        run: |
          set -euo pipefail
          cmp test-output/CP-GHA-033/cli-contributors.md test-output/CP-GHA-033/contributors.md
          cmp test-output/CP-GHA-033/cli-state.jsonl test-output/CP-GHA-033/.contributors.jsonl
          test "${{ steps.action.outputs.changed }}" = "false"
          node -e 'const fs=require("fs"); for (const line of fs.readFileSync("test-output/CP-GHA-033/.contributors.jsonl","utf8").trim().split(/\n/)) JSON.parse(line);'
          {
            echo "### CP-GHA-033"
            echo ""
            echo "- output: test-output/CP-GHA-033/contributors.md"
            echo "- action-changed: ${{ steps.action.outputs.changed }}"
            echo "- cli-state: test-output/CP-GHA-033/cli-state.jsonl"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        with:
          name: cp-gha-033
          path: test-output/CP-GHA-033
          include-hidden-files: true

  cp-gha-034:
    name: CP-GHA-034 expected-failure-missing-state
    needs: cp-gha-033
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-034') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/checkout@v6
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare missing-state fixture
        run: |
          set -euo pipefail
          out_dir="test-output/CP-GHA-034"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          bash scripts/start-fake-api.sh 18034 "$out_dir" missing-state-token 26034 CP_GHA_034_API /__ready
      - name: "EXPECTED FAILURE: missing state without bootstrap"
        run: |
          set +e
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_REF_NAME="$GITHUB_REF_NAME" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-missing-state-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_034_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-034/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-034/.contributors.jsonl' \
            'INPUT_MODE=commit' \
            'INPUT_BOOTSTRAP=false' \
            node .github/actions/contributors-please-action/dist/index.js \
              > test-output/CP-GHA-034/expected-failure.raw.log 2>&1
          status=$?
          set -e
          cat test-output/CP-GHA-034/expected-failure.raw.log
          test "$status" != "0"
          grep -F "No state file found" test-output/CP-GHA-034/expected-failure.raw.log
          test ! -f test-output/CP-GHA-034/contributors.md
          test ! -f test-output/CP-GHA-034/.contributors.jsonl
          {
            echo "expected_failure: true"
            echo "expected_error: No state file found"
            echo "observed_status: $status"
            echo "control_output: none"
            echo "raw_log: test-output/CP-GHA-034/expected-failure.raw.log"
          } > test-output/CP-GHA-034/expected-failure.log
          cat test-output/CP-GHA-034/expected-failure.log >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        with:
          name: cp-gha-034
          path: test-output/CP-GHA-034
          include-hidden-files: true

  cp-gha-035:
    name: CP-GHA-035 bootstrap true pull request
    needs: cp-gha-034
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-035') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/checkout@v6
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare bootstrap PR fixture
        run: |
          set -euo pipefail
          out_dir="$GITHUB_WORKSPACE/test-output/CP-GHA-035"
          repo="$out_dir/repo"
          origin_dir="$RUNNER_TEMP/cp-gha-035-origin.git"
          rm -rf "$out_dir" "$origin_dir"
          mkdir -p "$repo"
          git init "$repo"
          git -C "$repo" branch -M main
          git -C "$repo" config user.name "Fixture Committer"
          git -C "$repo" config user.email "fixture@example.com"
          echo "bootstrap pr" > "$repo/bootstrap-pr.md"
          git -C "$repo" add bootstrap-pr.md
          GIT_AUTHOR_NAME="Bootstrap PR" \
            GIT_AUTHOR_EMAIL="26035+bootstrap-pr@users.noreply.github.com" \
            GIT_AUTHOR_DATE="2026-05-28T12:00:00Z" \
            GIT_COMMITTER_DATE="2026-05-28T12:00:00Z" \
            git -C "$repo" commit -m "docs: seed bootstrap pr"
          git init --bare "$origin_dir"
          git -C "$repo" remote add origin "$origin_dir"
          git -C "$repo" push origin HEAD:main
          cat > "$out_dir/api-contributors.json" <<'JSON'
          [{"login":"bootstrap-pr","avatar_url":"","html_url":"https://github.com/bootstrap-pr","contributions":1}]
          JSON
          bash scripts/start-fake-api.sh 18035 "$out_dir" bootstrap-pr-token 26035 CP_GHA_035_API /__ready
      - name: Run bootstrap pull-request mode
        id: bootstrap
        run: |
          action_dist="$GITHUB_WORKSPACE/.github/actions/contributors-please-action/dist/index.js"
          cd test-output/CP-GHA-035/repo
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_REF_NAME=main \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-bootstrap-pr-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_035_API}" \
            'INPUT_OUTPUT-FILE=contributors.md' \
            'INPUT_STATE-FILE=.contributors.jsonl' \
            'INPUT_MODE=pull-request' \
            'INPUT_BOOTSTRAP=true' \
            'INPUT_ENTRY-TEMPLATE={{login}} {{title}}' \
            node "$action_dist"
          cp contributors.md ../contributors.md
          cp .contributors.jsonl ../.contributors.jsonl
          cp ../pull-request.json ../pr-evidence.json
      - name: Verify bootstrap PR
        run: |
          set -euo pipefail
          test "${{ steps.bootstrap.outputs.pr-opened }}" = "true"
          test -n "${{ steps.bootstrap.outputs.pr-number }}"
          jq -r .title test-output/CP-GHA-035/pr-evidence.json | grep -F "chore: bootstrap contributors"
          test -s test-output/CP-GHA-035/.contributors.jsonl
          grep -F "bootstrap-pr" test-output/CP-GHA-035/contributors.md
          {
            echo "### CP-GHA-035"
            echo ""
            echo "- output: test-output/CP-GHA-035/contributors.md"
            echo "- pr: ${{ steps.bootstrap.outputs.pr-url }}"
            echo "- pr-evidence: test-output/CP-GHA-035/pr-evidence.json"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        with:
          name: cp-gha-035
          path: test-output/CP-GHA-035
          include-hidden-files: true

  cp-gha-036:
    name: CP-GHA-036 schema validation codegen invariants
    needs: cp-gha-035
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-036') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/checkout@v6
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - uses: actions/checkout@v6
        with:
          repository: smorinlabs/contributors-please
          ref: ${{ inputs.library_ref || 'main' }}
          path: test-output/CP-GHA-036/contributors-please
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Run library schema checks
        run: |
          set -euo pipefail
          npm ci --prefix test-output/CP-GHA-036/contributors-please
          npm test --prefix test-output/CP-GHA-036/contributors-please -- test/schemas.test.ts test/engine/config.test.ts
          npm run --prefix test-output/CP-GHA-036/contributors-please schema:codegen
          git -C test-output/CP-GHA-036/contributors-please diff --exit-code -- src/types \
            > test-output/CP-GHA-036/schema-codegen.diff
      - name: Prepare invalid config fixture
        run: |
          set -euo pipefail
          cat > test-output/CP-GHA-036/.contributors.jsonl <<'JSONL'
          {"login":"schema-control","name":"Schema Control","profile":"https://example.com/schema-control","avatar":"","source":"commit","pinned":false,"categories":["code"],"title":"Code Contributor","emoji":"code","commits":2,"first_seen":"2026-05-28","last_updated":"2026-05-28"}
          JSONL
          cat > test-output/CP-GHA-036/invalid.yml <<'YAML'
          columns_per_row: nope
          YAML
          bash scripts/start-fake-api.sh 18036 test-output/CP-GHA-036 schema-token 26036 CP_GHA_036_API /__ready
      - name: "EXPECTED FAILURE: invalid config invariant"
        run: |
          set +e
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_REF_NAME="$GITHUB_REF_NAME" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-schema-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_036_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-036/control-contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-036/.contributors.jsonl' \
            'INPUT_CONFIG-FILE=test-output/CP-GHA-036/invalid.yml' \
            'INPUT_MODE=check' \
            'INPUT_DRY-RUN=true' \
            node .github/actions/contributors-please-action/dist/index.js \
              > test-output/CP-GHA-036/expected-failure.raw.log 2>&1
          status=$?
          set -e
          cat test-output/CP-GHA-036/expected-failure.raw.log
          test "$status" != "0"
          grep -F "Expected number value" test-output/CP-GHA-036/expected-failure.raw.log
          {
            echo "expected_failure: true"
            echo "expected_error: Expected number value"
            echo "observed_status: $status"
            echo "schema_codegen_diff: test-output/CP-GHA-036/schema-codegen.diff"
            echo "raw_log: test-output/CP-GHA-036/expected-failure.raw.log"
          } > test-output/CP-GHA-036/expected-failure.log
          cat test-output/CP-GHA-036/expected-failure.log >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        with:
          name: cp-gha-036
          path: test-output/CP-GHA-036
          include-hidden-files: true

  cp-gha-037:
    name: CP-GHA-037 public API and custom classifier
    needs: cp-gha-036
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-037') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: smorinlabs/contributors-please
          ref: ${{ inputs.library_ref || 'main' }}
          path: test-output/CP-GHA-037/contributors-please
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Exercise public API
        run: |
          set -euo pipefail
          npm ci --prefix test-output/CP-GHA-037/contributors-please
          npm run --prefix test-output/CP-GHA-037/contributors-please build
          npm run --prefix test-output/CP-GHA-037/contributors-please test:public-api
          npm run --prefix test-output/CP-GHA-037/contributors-please check:public-api-snapshot
          cat > test-output/CP-GHA-037/public-api-smoke.mjs <<'JS'
          import { execFileSync } from "node:child_process";
          import { mkdirSync, writeFileSync } from "node:fs";
          import { resolve } from "node:path";
          import {
            Contributors,
            GitHubClient,
            PathClassifier,
            VERSION,
            mergeState,
            parseTemplate,
            render,
          } from "./contributors-please/dist/lib.js";
          if (!Contributors || !GitHubClient || !PathClassifier || !VERSION) {
            throw new Error("missing public export");
          }
          const repo = resolve("test-output/CP-GHA-037/consumer");
          mkdirSync(repo, { recursive: true });
          execFileSync("git", ["init"], { cwd: repo });
          writeFileSync(`${repo}/feature.txt`, "custom classifier\n");
          execFileSync("git", ["add", "feature.txt"], { cwd: repo });
          execFileSync("git", [
            "-c", "user.name=Custom User",
            "-c", "user.email=37+custom-login@users.noreply.github.com",
            "commit",
            "-m",
            "test: custom classifier",
          ], { cwd: repo });
          const github = {
            serverUrl: "https://github.com",
            listContributors: async () => [{
              login: "custom-login",
              name: "Custom User",
              profile: "https://github.com/custom-login",
              avatar: "",
              commits: 1,
            }],
          };
          const classifier = {
            classify() {
              return { categories: ["custom"], title: "Custom Title", emoji: "custom" };
            },
          };
          const contributors = await Contributors.fromConfig(github, {
            classifier,
            entry_template: "{{login}} {{title}}",
            min_contributions: 1,
          }, { repoPath: repo, bootstrap: true });
          const result = await contributors.run();
          if (result.contributorsJson[0]?.title !== "Custom Title") {
            throw new Error("custom classifier result was not used");
          }
          if (!parseTemplate("{{login}}", result.contributorsJson[0]).includes("custom-login")) {
            throw new Error("parseTemplate public export failed");
          }
          const rendered = render({
            records: result.contributorsJson,
            config: {
              classifier: "path",
              classification: {
                categories: [],
                default: { id: "code", label: "Code Contributor" },
                combinations: [],
                multiCategoryResolution: "priority",
              },
              identityMap: [],
              outputFile: "contributors.md",
              stateFile: ".contributors.jsonl",
              configFile: ".contributors.yml",
              templatePlaceholder: "<!-- CONTRIBUTORS -->",
              inPlace: false,
              inPlaceMarkerStart: "<!-- contributors-please:start -->",
              inPlaceMarkerEnd: "<!-- contributors-please:end -->",
              entryTemplate: "{{login}}",
              emptyText: "",
              columnsPerRow: 6,
              sort: "contributions",
              minContributions: 1,
              ignore: [],
              unignore: [],
              pinWarnOnStale: true,
            },
          });
          if (!rendered.content.includes("custom-login")) {
            throw new Error("render public export failed");
          }
          mergeState([], result.contributorsJson);
          JS
          node test-output/CP-GHA-037/public-api-smoke.mjs
          cp test-output/CP-GHA-037/contributors-please/test/fixtures/public-api.d.ts \
            test-output/CP-GHA-037/public-api.d.ts
          printf 'custom-login Custom Title\n' > test-output/CP-GHA-037/contributors.md
          {
            echo "### CP-GHA-037"
            echo ""
            echo "- output: test-output/CP-GHA-037/contributors.md"
            echo "- public-api-smoke: test-output/CP-GHA-037/public-api-smoke.mjs"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        with:
          name: cp-gha-037
          path: test-output/CP-GHA-037
          include-hidden-files: true

  cp-gha-038:
    name: CP-GHA-038 reproducible bundles and action wrapper
    needs: cp-gha-037
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-038') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/checkout@v6
        with:
          repository: smorinlabs/contributors-please
          ref: ${{ inputs.library_ref || 'main' }}
          path: test-output/CP-GHA-038/contributors-please
      - uses: actions/checkout@v6
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: test-output/CP-GHA-038/contributors-please-action
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Build library and action from source
        run: |
          set -euo pipefail
          npm ci --prefix test-output/CP-GHA-038/contributors-please
          npm run --prefix test-output/CP-GHA-038/contributors-please build
          git -C test-output/CP-GHA-038/contributors-please diff --exit-code -- dist \
            > test-output/CP-GHA-038/library-dist.diff
          npm ci --prefix test-output/CP-GHA-038/contributors-please-action
          npm run --prefix test-output/CP-GHA-038/contributors-please-action build
          git -C test-output/CP-GHA-038/contributors-please-action diff --exit-code -- dist \
            > test-output/CP-GHA-038/action-dist.diff
          node -e 'const fs=require("fs"); const y=fs.readFileSync("test-output/CP-GHA-038/contributors-please-action/action.yml","utf8"); if(!y.includes("using: node24") || !y.includes("main: dist/index.js")) throw new Error("action.yml runtime/main mismatch");'
          node <<'JS'
          const fs = require("fs");
          const p = require("./test-output/CP-GHA-038/contributors-please-action/dist/package.json");
          fs.writeFileSync(
            "test-output/CP-GHA-038/bundled-library-version.txt",
            `${p.dependencies?.["contributors-please"] ?? p.version ?? "unknown"}\n`,
          );
          JS
          cat > test-output/CP-GHA-038/.contributors.jsonl <<'JSONL'
          {"login":"bundle-smoke","name":"Bundle Smoke","profile":"https://example.com/bundle-smoke","avatar":"","source":"commit","pinned":false,"categories":["code"],"title":"Code Contributor","emoji":"code","commits":2,"first_seen":"2026-05-28","last_updated":"2026-05-28"}
          JSONL
          bash scripts/start-fake-api.sh 18038 test-output/CP-GHA-038 bundle-token 26038 CP_GHA_038_API /__ready
      - name: Run rebuilt action smoke
        id: smoke
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_REF_NAME="$GITHUB_REF_NAME" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-bundle-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_038_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-038/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-038/.contributors.jsonl' \
            'INPUT_MODE=commit' \
            'INPUT_ENTRY-TEMPLATE={{login}}' \
            'INPUT_MIN-CONTRIBUTIONS=1' \
            node test-output/CP-GHA-038/contributors-please-action/dist/index.js
      - name: Verify build smoke
        run: |
          set -euo pipefail
          test "${{ steps.smoke.outputs.changed }}" = "true"
          test -n "${{ steps.smoke.outputs.commit-sha }}"
          grep -F "bundle-smoke" test-output/CP-GHA-038/contributors.md
          test -s test-output/CP-GHA-038/bundled-library-version.txt
          {
            echo "### CP-GHA-038"
            echo ""
            echo "- output: test-output/CP-GHA-038/contributors.md"
            echo "- library-dist-diff: test-output/CP-GHA-038/library-dist.diff"
            echo "- action-dist-diff: test-output/CP-GHA-038/action-dist.diff"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        with:
          name: cp-gha-038
          path: test-output/CP-GHA-038
          include-hidden-files: true

  cp-gha-044:
    name: CP-GHA-044 CLI render validate parity
    needs: cp-gha-038
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-044') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/checkout@v6
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Prepare CLI fixture
        run: |
          set -euo pipefail
          out_dir="test-output/CP-GHA-044"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          cat > "$out_dir/.contributors.jsonl" <<'JSONL'
          {"login":"cli-parity","name":"CLI Parity","profile":"https://example.com/cli-parity","avatar":"","source":"commit","pinned":false,"categories":["code"],"title":"Code Contributor","emoji":"code","commits":2,"first_seen":"2026-05-28","last_updated":"2026-05-28"}
          JSONL
          cat > "$out_dir/.contributors.yml" <<'YAML'
          output_file: test-output/CP-GHA-044/cli-contributors.md
          state_file: test-output/CP-GHA-044/.contributors.jsonl
          entry_template: "{{login}} {{title}}"
          min_contributions: 1
          YAML
          bash scripts/start-fake-api.sh 18044 "$out_dir" cli-parity-token 26044 CP_GHA_044_API /__ready
      - name: Run published CLI validate and render
        run: |
          set -euo pipefail
          npm_config_yes=true npx contributors-please@latest validate --config-file test-output/CP-GHA-044/.contributors.yml \
            > test-output/CP-GHA-044/validate.log
          npm_config_yes=true npx contributors-please@latest render --config-file test-output/CP-GHA-044/.contributors.yml \
            > test-output/CP-GHA-044/render.log
          cp test-output/CP-GHA-044/cli-contributors.md test-output/CP-GHA-044/cli-rendered.md
      - name: Run Action against same fixture
        id: action
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_REF_NAME="$GITHUB_REF_NAME" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-cli-parity-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_044_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-044/cli-contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-044/.contributors.jsonl' \
            'INPUT_CONFIG-FILE=test-output/CP-GHA-044/.contributors.yml' \
            'INPUT_MODE=check' \
            'INPUT_DRY-RUN=true' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Verify CLI and Action parity
        run: |
          set -euo pipefail
          cp test-output/CP-GHA-044/cli-rendered.md test-output/CP-GHA-044/contributors.md
          grep -F "contributors-please config is valid" test-output/CP-GHA-044/validate.log
          grep -F "contributors-please rendered" test-output/CP-GHA-044/render.log
          cmp test-output/CP-GHA-044/cli-rendered.md test-output/CP-GHA-044/contributors.md
          test "${{ steps.action.outputs.changed }}" = "false"
          {
            echo "### CP-GHA-044"
            echo ""
            echo "- output: test-output/CP-GHA-044/contributors.md"
            echo "- action-changed: ${{ steps.action.outputs.changed }}"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        with:
          name: cp-gha-044
          path: test-output/CP-GHA-044
          include-hidden-files: true

  cp-gha-047:
    name: CP-GHA-047 commit-message variants
    needs: cp-gha-044
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-047') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/checkout@v6
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare commit-message fixtures
        run: |
          set -euo pipefail
          git pull --ff-only origin "$GITHUB_REF_NAME"
          out_dir="test-output/CP-GHA-047"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          for case_id in default multiline literal; do
            cat > "$out_dir/${case_id}.jsonl" <<JSONL
          {"login":"commit-message-${case_id}","name":"Commit Message ${case_id}","profile":"https://example.com/commit-message-${case_id}","avatar":"","source":"commit","pinned":false,"categories":["code"],"title":"Code Contributor","emoji":"code","commits":2,"first_seen":"2026-05-28","last_updated":"2026-05-28"}
          JSONL
          done
          bash scripts/start-fake-api.sh 18047 "$out_dir" commit-message-token 26047 CP_GHA_047_API /__ready
      - name: Default commit message
        id: default_message
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_REF_NAME="$GITHUB_REF_NAME" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-commit-message-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_047_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-047/default-contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-047/default.jsonl' \
            'INPUT_MODE=commit' \
            'INPUT_ENTRY-TEMPLATE={{login}}' \
            'INPUT_MIN-CONTRIBUTIONS=1' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Multiline commit message
        id: multiline_message
        env:
          CP_GHA_047_MULTILINE_MESSAGE: |-
            docs: multiline contributors update

            body line one
            body line two
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_REF_NAME="$GITHUB_REF_NAME" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-commit-message-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_047_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-047/multiline-contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-047/multiline.jsonl' \
            'INPUT_MODE=commit' \
            "INPUT_COMMIT-MESSAGE=${CP_GHA_047_MULTILINE_MESSAGE}" \
            'INPUT_ENTRY-TEMPLATE={{login}}' \
            'INPUT_MIN-CONTRIBUTIONS=1' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Literal backslash-n commit message
        id: literal_message
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_REF_NAME="$GITHUB_REF_NAME" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-commit-message-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_047_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-047/literal-contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-047/literal.jsonl' \
            'INPUT_MODE=commit' \
            'INPUT_COMMIT-MESSAGE=docs: literal \n contributors update [skip ci]' \
            'INPUT_ENTRY-TEMPLATE={{login}}' \
            'INPUT_MIN-CONTRIBUTIONS=1' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Verify commit messages
        run: |
          set -euo pipefail
          git log -1 --format=%B "${{ steps.default_message.outputs.commit-sha }}" > test-output/CP-GHA-047/default-message.txt
          git log -1 --format=%B "${{ steps.multiline_message.outputs.commit-sha }}" > test-output/CP-GHA-047/multiline-message.txt
          git log -1 --format=%B "${{ steps.literal_message.outputs.commit-sha }}" > test-output/CP-GHA-047/literal-message.txt
          grep -F "[skip ci]" test-output/CP-GHA-047/default-message.txt
          grep -F "body line one" test-output/CP-GHA-047/multiline-message.txt
          grep -F "body line two" test-output/CP-GHA-047/multiline-message.txt
          grep -F "\\n" test-output/CP-GHA-047/literal-message.txt
          cp test-output/CP-GHA-047/literal-contributors.md test-output/CP-GHA-047/contributors.md
          {
            echo "### CP-GHA-047"
            echo ""
            echo "- output: test-output/CP-GHA-047/contributors.md"
            echo "- default-sha: ${{ steps.default_message.outputs.commit-sha }}"
            echo "- multiline-sha: ${{ steps.multiline_message.outputs.commit-sha }}"
            echo "- literal-sha: ${{ steps.literal_message.outputs.commit-sha }}"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        with:
          name: cp-gha-047
          path: test-output/CP-GHA-047
          include-hidden-files: true
