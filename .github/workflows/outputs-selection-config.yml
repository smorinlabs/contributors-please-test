name: contributors-please outputs selection config

on:
  workflow_dispatch:
    inputs:
      action_ref:
        description: contributors-please-action ref to test.
        required: false
        default: v1
      test_id:
        description: CP-GHA outputs/config test ID to run, or all.
        required: false
        default: all
        type: choice
        options:
          - all
          - CP-GHA-027
          - CP-GHA-028
          - CP-GHA-029
          - CP-GHA-030
          - CP-GHA-045
          - CP-GHA-046

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: contributors-please-test-${{ github.ref }}
  cancel-in-progress: false

env:
  ACTION_PATH: .github/actions/contributors-please-action

jobs:
  cp-gha-027:
    name: CP-GHA-027 outputs and summary
    if: ${{ inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-027' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare fixture
        run: |
          set -euo pipefail
          git pull --ff-only origin "$GITHUB_REF_NAME"
          out_dir="test-output/CP-GHA-027"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          cat > "$out_dir/.contributors.jsonl" <<'JSONL'
          {"login":"outputs-tester","name":"Outputs Tester","profile":"https://example.com/outputs-tester","avatar":"","source":"commit","pinned":false,"categories":["code"],"title":"Code Contributor","emoji":"code","commits":3,"first_seen":"2026-05-27","last_updated":"2026-05-27"}
          JSONL
          nohup node scripts/fake-github-api.mjs 18027 "$out_dir" outputs-bot-027 27027 > "$out_dir/server.log" 2>&1 &
          echo "$!" > "$out_dir/server.pid"
          for _ in {1..20}; do
            if curl -fsS http://127.0.0.1:18027/__ready >/dev/null; then
              break
            fi
            sleep 0.25
          done
          curl -fsS http://127.0.0.1:18027/__ready >/dev/null
          echo "CP_GHA_027_API=http://127.0.0.1:18027" >> "$GITHUB_ENV"
      - name: Run contributors-please
        id: contributors
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_027_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-027/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-027/.contributors.jsonl' \
            'INPUT_MODE=commit' \
            'INPUT_DRY-RUN=false' \
            'INPUT_BOOTSTRAP=false' \
            'INPUT_ENTRY-TEMPLATE=- {{login}} {{title}}' \
            'INPUT_MIN-CONTRIBUTIONS=1' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Verify outputs
        run: |
          set -euo pipefail
          test "${{ steps.contributors.outputs.changed }}" = "true"
          test "${{ steps.contributors.outputs.added-logins }}" = "[]"
          test "${{ steps.contributors.outputs.promoted-logins }}" = "[]"
          test "${{ steps.contributors.outputs.contributors-count }}" = "1"
          test "${{ steps.contributors.outputs.token-source }}" = "pat"
          test "${{ steps.contributors.outputs.committer-login }}" = "outputs-bot-027"
          test -n '${{ steps.contributors.outputs.contributors-json }}'
          test "${{ steps.contributors.outputs.pr-opened }}" = "false"
          test "${{ steps.contributors.outputs.pr-number }}" = ""
          test "${{ steps.contributors.outputs.pr-url }}" = ""
          test -n "${{ steps.contributors.outputs.commit-sha }}"
          printf '%s\n' '${{ steps.contributors.outputs.contributors-json }}' > test-output/CP-GHA-027/contributors-json.json
          node <<'NODE'
          const fs = require("node:fs");
          const contributors = JSON.parse(fs.readFileSync("test-output/CP-GHA-027/contributors-json.json", "utf8"));
          if (contributors.length !== 1 || contributors[0].login !== "outputs-tester") {
            throw new Error(`unexpected contributors-json output: ${JSON.stringify(contributors)}`);
          }
          NODE
          grep -F "outputs-tester" test-output/CP-GHA-027/contributors.md
          cat > test-output/CP-GHA-027/consumed-outputs.txt <<'TXT'
          added-logins
          changed
          commit-sha
          committer-login
          contributors-count
          contributors-json
          pr-number
          pr-opened
          pr-url
          promoted-logins
          token-source
          TXT
          node <<'NODE'
          const fs = require("node:fs");
          const action = fs.readFileSync(".github/actions/contributors-please-action/action.yml", "utf8");
          const outputsBlock = action.split(/^outputs:\n/m)[1].split(/^runs:\n/m)[0];
          const names = [...outputsBlock.matchAll(/^  ([a-z0-9-]+):/gm)].map(match => match[1]).sort();
          fs.writeFileSync("test-output/CP-GHA-027/declared-outputs.txt", `${names.join("\n")}\n`);
          NODE
          sort test-output/CP-GHA-027/consumed-outputs.txt > test-output/CP-GHA-027/consumed-outputs.sorted.txt
          cmp test-output/CP-GHA-027/declared-outputs.txt test-output/CP-GHA-027/consumed-outputs.sorted.txt
          {
            echo "changed=${{ steps.contributors.outputs.changed }}"
            echo "added-logins=${{ steps.contributors.outputs.added-logins }}"
            echo "promoted-logins=${{ steps.contributors.outputs.promoted-logins }}"
            echo "contributors-count=${{ steps.contributors.outputs.contributors-count }}"
            echo "token-source=${{ steps.contributors.outputs.token-source }}"
            echo "committer-login=${{ steps.contributors.outputs.committer-login }}"
            printf 'contributors-json='
            cat test-output/CP-GHA-027/contributors-json.json
            echo "pr-opened=${{ steps.contributors.outputs.pr-opened }}"
            echo "pr-number=${{ steps.contributors.outputs.pr-number }}"
            echo "pr-url=${{ steps.contributors.outputs.pr-url }}"
            echo "commit-sha=${{ steps.contributors.outputs.commit-sha }}"
          } > test-output/CP-GHA-027/action-outputs.txt
          {
            echo "### CP-GHA-027"
            echo ""
            echo "- output: test-output/CP-GHA-027/contributors.md"
            echo "- changed: ${{ steps.contributors.outputs.changed }}"
            echo "- count: ${{ steps.contributors.outputs.contributors-count }}"
            echo "- token-source: ${{ steps.contributors.outputs.token-source }}"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: cp-gha-027
          path: test-output/CP-GHA-027
          include-hidden-files: true

  cp-gha-028:
    name: CP-GHA-028 selection and ordering
    needs: cp-gha-027
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-028') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare fixture
        run: |
          set -euo pipefail
          git pull --ff-only origin "$GITHUB_REF_NAME"
          out_dir="test-output/CP-GHA-028"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          cat > "$out_dir/base.jsonl" <<'JSONL'
          {"login":"zeta","name":"Zeta","profile":"https://example.com/zeta","avatar":"","source":"commit","pinned":false,"categories":["code"],"title":"Code Contributor","emoji":"code","commits":5,"first_seen":"2026-05-22","last_updated":"2026-05-27"}
          {"login":"alpha","name":"Alpha","profile":"https://example.com/alpha","avatar":"","source":"commit","pinned":false,"categories":["docs"],"title":"Docs Contributor","emoji":"docs","commits":3,"first_seen":"2026-05-20","last_updated":"2026-05-27"}
          {"login":"small","name":"Small","profile":"https://example.com/small","avatar":"","source":"commit","pinned":false,"categories":["code"],"title":"Code Contributor","emoji":"code","commits":1,"first_seen":"2026-05-22","last_updated":"2026-05-27"}
          {"login":"automation[bot]","name":"Automation Bot","profile":"https://example.com/automation-bot","avatar":"","source":"commit","pinned":false,"categories":["code"],"title":"Code Contributor","emoji":"code","commits":100,"first_seen":"2026-05-19","last_updated":"2026-05-27"}
          JSONL
          cp "$out_dir/base.jsonl" "$out_dir/alphabetical.jsonl"
          cp "$out_dir/base.jsonl" "$out_dir/contributions.jsonl"
          cp "$out_dir/base.jsonl" "$out_dir/first-seen.jsonl"
          nohup node scripts/fake-github-api.mjs 18028 "$out_dir" selection-bot-028 28028 > "$out_dir/server.log" 2>&1 &
          echo "$!" > "$out_dir/server.pid"
          for _ in {1..20}; do
            if curl -fsS http://127.0.0.1:18028/__ready >/dev/null; then
              break
            fi
            sleep 0.25
          done
          curl -fsS http://127.0.0.1:18028/__ready >/dev/null
          echo "CP_GHA_028_API=http://127.0.0.1:18028" >> "$GITHUB_ENV"
      - name: Run alphabetical selection
        id: alphabetical
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_028_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-028/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-028/alphabetical.jsonl' \
            'INPUT_MODE=commit' \
            'INPUT_DRY-RUN=false' \
            'INPUT_BOOTSTRAP=false' \
            'INPUT_ENTRY-TEMPLATE={{login}}' \
            'INPUT_IGNORE=zeta' \
            'INPUT_UNIGNORE=zeta' \
            'INPUT_MIN-CONTRIBUTIONS=2' \
            'INPUT_SORT=alphabetical' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Run contributions selection
        id: contributions
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_028_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-028/contributions-contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-028/contributions.jsonl' \
            'INPUT_MODE=commit' \
            'INPUT_DRY-RUN=false' \
            'INPUT_BOOTSTRAP=false' \
            'INPUT_ENTRY-TEMPLATE={{login}}' \
            'INPUT_IGNORE=zeta' \
            'INPUT_UNIGNORE=zeta' \
            'INPUT_MIN-CONTRIBUTIONS=2' \
            'INPUT_SORT=contributions' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Run first-seen selection
        id: first_seen
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_028_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-028/first-seen-contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-028/first-seen.jsonl' \
            'INPUT_MODE=commit' \
            'INPUT_DRY-RUN=false' \
            'INPUT_BOOTSTRAP=false' \
            'INPUT_ENTRY-TEMPLATE={{login}}' \
            'INPUT_IGNORE=zeta' \
            'INPUT_UNIGNORE=zeta' \
            'INPUT_MIN-CONTRIBUTIONS=2' \
            'INPUT_SORT=first-seen' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Verify selection
        run: |
          set -euo pipefail
          grep -F "alpha zeta" test-output/CP-GHA-028/contributors.md
          grep -F "zeta alpha" test-output/CP-GHA-028/contributions-contributors.md
          grep -F "alpha zeta" test-output/CP-GHA-028/first-seen-contributors.md
          if grep -F "small" test-output/CP-GHA-028/contributors.md; then
            echo "min-contributions did not filter small" >&2
            exit 1
          fi
          if grep -R -F "automation[bot]" test-output/CP-GHA-028/*.md; then
            echo "automatic bot exclusion did not filter automation[bot]" >&2
            exit 1
          fi
          {
            echo "alphabetical: alpha zeta"
            echo "contributions: zeta alpha"
            echo "first-seen: alpha zeta"
            echo "filtered: small"
            echo "auto-excluded: automation[bot]"
            echo "unignored: zeta"
          } > test-output/CP-GHA-028/expected-order.txt
          {
            echo "### CP-GHA-028"
            echo ""
            echo "- output: test-output/CP-GHA-028/contributors.md"
            echo "- contributions-output: test-output/CP-GHA-028/contributions-contributors.md"
            echo "- first-seen-output: test-output/CP-GHA-028/first-seen-contributors.md"
            echo "- selection: ignore plus unignore, automatic bot exclusion, min-contributions, all sort modes"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: cp-gha-028
          path: test-output/CP-GHA-028
          include-hidden-files: true

  cp-gha-029:
    name: CP-GHA-029 flat and root package config
    needs: cp-gha-028
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-029') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare fixtures
        run: |
          set -euo pipefail
          git pull --ff-only origin "$GITHUB_REF_NAME"
          out_dir="test-output/CP-GHA-029"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          for case_id in flat root; do
            cat > "$out_dir/${case_id}.jsonl" <<'JSONL'
          {"login":"config-tester","name":"Config Tester","profile":"https://example.com/config-tester","avatar":"","source":"commit","pinned":false,"categories":["code"],"title":"Code Contributor","emoji":"code","commits":2,"first_seen":"2026-05-27","last_updated":"2026-05-27"}
          JSONL
          done
          cat > "$out_dir/flat.yml" <<'YAML'
          entry_template: "{{login}} flat"
          YAML
          cat > "$out_dir/root.yml" <<'YAML'
          packages:
            ".":
              entry_template: "{{login}} flat"
          YAML
          nohup node scripts/fake-github-api.mjs 18029 "$out_dir" config-bot-029 29029 > "$out_dir/server.log" 2>&1 &
          echo "$!" > "$out_dir/server.pid"
          for _ in {1..20}; do
            if curl -fsS http://127.0.0.1:18029/__ready >/dev/null; then
              break
            fi
            sleep 0.25
          done
          curl -fsS http://127.0.0.1:18029/__ready >/dev/null
          echo "CP_GHA_029_API=http://127.0.0.1:18029" >> "$GITHUB_ENV"
      - name: Run flat config
        id: flat
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_029_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-029/flat-contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-029/flat.jsonl' \
            'INPUT_CONFIG-FILE=test-output/CP-GHA-029/flat.yml' \
            'INPUT_MODE=commit' \
            'INPUT_DRY-RUN=false' \
            'INPUT_BOOTSTRAP=false' \
            'INPUT_MIN-CONTRIBUTIONS=1' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Run root package config
        id: root
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_029_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-029/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-029/root.jsonl' \
            'INPUT_CONFIG-FILE=test-output/CP-GHA-029/root.yml' \
            'INPUT_MODE=commit' \
            'INPUT_DRY-RUN=false' \
            'INPUT_BOOTSTRAP=false' \
            'INPUT_MIN-CONTRIBUTIONS=1' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Verify config equivalence
        run: |
          set -euo pipefail
          cmp test-output/CP-GHA-029/flat-contributors.md test-output/CP-GHA-029/contributors.md
          grep -F "config-tester flat" test-output/CP-GHA-029/contributors.md
          printf '%s\n' '${{ steps.flat.outputs.contributors-json }}' > test-output/CP-GHA-029/flat-contributors-json.json
          printf '%s\n' '${{ steps.root.outputs.contributors-json }}' > test-output/CP-GHA-029/root-contributors-json.json
          cmp test-output/CP-GHA-029/flat-contributors-json.json test-output/CP-GHA-029/root-contributors-json.json
          {
            echo "flat-config: test-output/CP-GHA-029/flat.yml"
            echo "root-config: test-output/CP-GHA-029/root.yml"
            echo "contributors-json: equivalent"
          } > test-output/CP-GHA-029/config-equivalence.txt
          {
            echo "### CP-GHA-029"
            echo ""
            echo "- output: test-output/CP-GHA-029/contributors.md"
            echo "- flat-changed: ${{ steps.flat.outputs.changed }}"
            echo "- root-changed: ${{ steps.root.outputs.changed }}"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: cp-gha-029
          path: test-output/CP-GHA-029
          include-hidden-files: true

  cp-gha-030:
    name: CP-GHA-030 expected-failure-non-root-package
    needs: cp-gha-029
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-030') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare fixtures
        run: |
          set -euo pipefail
          git pull --ff-only origin "$GITHUB_REF_NAME"
          out_dir="test-output/CP-GHA-030"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          cat > "$out_dir/.contributors.jsonl" <<'JSONL'
          {"login":"package-control","name":"Package Control","profile":"https://example.com/package-control","avatar":"","source":"commit","pinned":false,"categories":["code"],"title":"Code Contributor","emoji":"code","commits":2,"first_seen":"2026-05-27","last_updated":"2026-05-27"}
          JSONL
          cat > "$out_dir/invalid.yml" <<'YAML'
          packages:
            ".":
              entry_template: "{{login}}"
            "packages/api":
              entry_template: "{{login}}"
          YAML
          nohup node scripts/fake-github-api.mjs 18030 "$out_dir" package-bot-030 30030 > "$out_dir/server.log" 2>&1 &
          echo "$!" > "$out_dir/server.pid"
          for _ in {1..20}; do
            if curl -fsS http://127.0.0.1:18030/__ready >/dev/null; then
              break
            fi
            sleep 0.25
          done
          curl -fsS http://127.0.0.1:18030/__ready >/dev/null
          echo "CP_GHA_030_API=http://127.0.0.1:18030" >> "$GITHUB_ENV"
      - name: Run control contributors file
        id: control
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_030_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-030/control-contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-030/.contributors.jsonl' \
            'INPUT_MODE=commit' \
            'INPUT_DRY-RUN=false' \
            'INPUT_BOOTSTRAP=false' \
            'INPUT_ENTRY-TEMPLATE={{login}}' \
            'INPUT_MIN-CONTRIBUTIONS=1' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: "EXPECTED FAILURE: non-root package key"
        id: expected_failure
        continue-on-error: true
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_030_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-030/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-030/.contributors.jsonl' \
            'INPUT_CONFIG-FILE=test-output/CP-GHA-030/invalid.yml' \
            'INPUT_MODE=commit' \
            'INPUT_DRY-RUN=false' \
            'INPUT_BOOTSTRAP=false' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Assert expected failure occurred
        run: |
          set -euo pipefail
          grep -F "package-control" test-output/CP-GHA-030/control-contributors.md
          test ! -f test-output/CP-GHA-030/contributors.md
          node <<'NODE'
          const fs = require("node:fs");
          const action = fs.readFileSync(".github/actions/contributors-please-action/action.yml", "utf8");
          const outputsBlock = action.split(/^outputs:\n/m)[1].split(/^runs:\n/m)[0];
          const names = [...outputsBlock.matchAll(/^  ([a-z0-9-]+):/gm)].map(match => match[1]);
          if (names.some(name => name.includes("--"))) {
            throw new Error(`fanout output unexpectedly declared: ${names.join(", ")}`);
          }
          fs.writeFileSync("test-output/CP-GHA-030/declared-outputs.txt", `${names.sort().join("\n")}\n`);
          NODE
          {
            echo "expected_failure: true"
            echo "expected_error: Per-package configuration"
            echo "observed_outcome: ${{ steps.expected_failure.outcome }}"
            echo "control_output: test-output/CP-GHA-030/control-contributors.md"
            echo "artifact: cp-gha-030"
          } > test-output/CP-GHA-030/expected-failure.log
          test "${{ steps.expected_failure.outcome }}" = "failure"
          cat test-output/CP-GHA-030/expected-failure.log >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: cp-gha-030
          path: test-output/CP-GHA-030
          include-hidden-files: true

  cp-gha-045:
    name: CP-GHA-045 defaults smoke
    needs: cp-gha-030
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-045') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare default fixture
        run: |
          set -euo pipefail
          git pull --ff-only origin "$GITHUB_REF_NAME"
