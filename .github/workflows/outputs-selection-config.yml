  cp-gha-046:
    name: CP-GHA-046 custom file path inputs
    needs: cp-gha-045
    if: ${{ always() && (inputs.test_id == 'all' || inputs.test_id == 'CP-GHA-046') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: smorinlabs/contributors-please-action
          ref: ${{ inputs.action_ref || 'v1' }}
          path: ${{ env.ACTION_PATH }}
      - name: Prepare custom paths
        run: |
          set -euo pipefail
          git pull --ff-only origin "$GITHUB_REF_NAME"
          out_dir="test-output/CP-GHA-046"
          rm -rf "$out_dir"
          rm -f contributors.md .contributors.jsonl .contributors.yml
          mkdir -p "$out_dir/config" "$out_dir/state" "$out_dir/out"
          cat > "$out_dir/state/custom.jsonl" <<'JSONL'
          {"login":"custom-path-tester","name":"Custom Path Tester","profile":"https://example.com/custom-path-tester","avatar":"","source":"commit","pinned":false,"categories":["code"],"title":"Code Contributor","emoji":"code","commits":2,"first_seen":"2026-05-27","last_updated":"2026-05-27"}
          JSONL
          cat > "$out_dir/config/custom.yml" <<'YAML'
          entry_template: "{{login}} custom"
          YAML
          nohup node scripts/fake-github-api.mjs 18046 "$out_dir" custom-path-bot-046 46046 > "$out_dir/server.log" 2>&1 &
          echo "$!" > "$out_dir/server.pid"
          for _ in {1..20}; do
            if curl -fsS http://127.0.0.1:18046/__ready >/dev/null; then
              break
            fi
            sleep 0.25
          done
          curl -fsS http://127.0.0.1:18046/__ready >/dev/null
          echo "CP_GHA_046_API=http://127.0.0.1:18046" >> "$GITHUB_ENV"
      - name: Run contributors-please
        id: contributors
        run: |
          env \
            GITHUB_ACTIONS=false \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            'INPUT_PAT=fake-token' \
            "INPUT_GITHUB-API-URL=${CP_GHA_046_API}" \
            'INPUT_OUTPUT-FILE=test-output/CP-GHA-046/out/contributors.md' \
            'INPUT_STATE-FILE=test-output/CP-GHA-046/state/custom.jsonl' \
            'INPUT_CONFIG-FILE=test-output/CP-GHA-046/config/custom.yml' \
            'INPUT_MODE=commit' \
            'INPUT_DRY-RUN=false' \
            'INPUT_BOOTSTRAP=false' \
            'INPUT_MIN-CONTRIBUTIONS=1' \
            node .github/actions/contributors-please-action/dist/index.js
      - name: Verify custom paths
        run: |
          set -euo pipefail
          cp test-output/CP-GHA-046/out/contributors.md test-output/CP-GHA-046/contributors.md
          grep -F "custom-path-tester custom" test-output/CP-GHA-046/contributors.md
          test ! -f contributors.md
          test ! -f .contributors.jsonl
          test ! -f .contributors.yml
          git show --name-only --format= "${{ steps.contributors.outputs.commit-sha }}" > test-output/CP-GHA-046/committed-files.txt
          grep -F "test-output/CP-GHA-046/out/contributors.md" test-output/CP-GHA-046/committed-files.txt
          grep -F "test-output/CP-GHA-046/state/custom.jsonl" test-output/CP-GHA-046/committed-files.txt
          if grep -E '^contributors\.md$|^\.contributors\.jsonl$|^\.contributors\.yml$' test-output/CP-GHA-046/committed-files.txt; then
            echo "default contributor paths unexpectedly committed" >&2
            exit 1
          fi
          {
            echo "### CP-GHA-046"
            echo ""
            echo "- output: test-output/CP-GHA-046/contributors.md"
            echo "- custom-output: test-output/CP-GHA-046/out/contributors.md"
            echo "- custom-state: test-output/CP-GHA-046/state/custom.jsonl"
            echo "- custom-config: test-output/CP-GHA-046/config/custom.yml"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: cp-gha-046
          path: test-output/CP-GHA-046
          include-hidden-files: true
